<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta name="description" content="MultiTool Pro – All tools in one place">
    <title>MultiTool Pro</title>
    <link rel="canonical" href="https://play.google.com/store/apps/details?id=multitool.pro2" />
    <meta name="robots" content="index, follow">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* ===== RESET & BASE ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #f4f6fc;
            --surface: #ffffff;
            --surface2: #f8faff;
            --text: #0a0a2a;
            --text2: #2d2d5a;
            --text3: #6c6c8a;
            --primary: #6c5ce7;
            --border: #e2e2ec;
            --radius: 24px;
            --shadow: 0 8px 24px rgba(0,0,0,0.06);
        }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 20px 16px 40px;
            max-width: 1200px;
            margin: 0 auto;
            line-height: 1.4;
        }
        h1 {
            font-size: 2rem;
            font-weight: 800;
            margin: 0 0 6px 0;
            letter-spacing: -0.02em;
        }
        .subhead {
            color: var(--text2);
            font-weight: 500;
            margin-bottom: 24px;
            font-size: 1.1rem;
        }
        a { color: var(--primary); text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* ===== TOOLS GRID ===== */
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 16px;
            margin: 28px 0 32px;
        }
        .tool-card {
            background: var(--surface);
            border-radius: 24px;
            padding: 18px 8px;
            text-align: center;
            cursor: pointer;
            border: 2px solid transparent;
            box-shadow: var(--shadow);
            transition: 0.2s ease;
        }
        .tool-card:hover {
            transform: translateY(-4px);
            border-color: var(--primary);
            box-shadow: 0 12px 28px rgba(108,92,231,0.15);
        }
        .tool-card .icon { font-size: 2.8rem; }
        .tool-card .name {
            font-weight: 700;
            font-size: 0.95rem;
            margin-top: 8px;
        }
        .tool-card.large {
            grid-column: span 2;
            background: linear-gradient(135deg, var(--primary), #00cec9);
            color: white;
            border: none;
        }
        .tool-card.large .name { font-size: 1.3rem; }

        /* ===== TOOL PANEL ===== */
        .tool-panel {
            background: var(--surface);
            border-radius: 32px;
            padding: 24px 20px;
            margin: 32px 0 24px;
            box-shadow: 0 12px 32px rgba(0,0,0,0.06);
            border: 1px solid var(--border);
        }
        .tool-panel h2 {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 16px;
        }
        .tool-panel .tool-content {
            /* dynamic content */
        }

        /* ===== OVERLAYS (same as original but stripped) ===== */
        .overlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 1000;
            overflow-y: auto;
            padding: 24px;
            display: none;
        }
        .overlay.active { display: block; }
        .overlay-inner {
            max-width: 1200px;
            margin: 0 auto;
            background: var(--surface);
            border-radius: 32px;
            padding: 28px 24px;
        }
        .overlay-inner h2 {
            font-size: 2rem;
            margin-bottom: 20px;
            text-align: center;
        }
        .close-overlay {
            background: var(--primary);
            border: none;
            color: white;
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: 700;
            cursor: pointer;
            font-size: 1rem;
            display: inline-block;
            margin-top: 24px;
        }
        .close-overlay:hover { background: #4834d4; }

        /* sub-grids inside overlays */
        .sub-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }
        .sub-card {
            background: var(--surface2);
            border-radius: 20px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.2s;
        }
        .sub-card:hover { border-color: var(--primary); }
        .sub-card .icon { font-size: 2.6rem; }
        .sub-card .name { font-weight: 700; margin-top: 6px; }

        /* ===== FOOTER ===== */
        .footer {
            margin-top: 48px;
            padding-top: 24px;
            border-top: 2px solid var(--border);
            text-align: center;
            font-size: 0.95rem;
            color: var(--text3);
        }
        .footer a { font-weight: 600; }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 540px) {
            .tools-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
            .tool-card.large { grid-column: span 1; }
        }
    </style>
</head>
<body>

    <h1>🛠️ MultiTool Pro</h1>
    <div class="subhead">All tools · AI Hub · Free</div>

    <!-- ===== TOOLS GRID (dynamic) ===== -->
    <div class="tools-grid" id="toolsGrid"></div>

    <!-- ===== TOOL PANEL ===== -->
    <div class="tool-panel" id="toolPanel">
        <h2 id="panelTitle">✨ Select a tool</h2>
        <div class="tool-content" id="toolContent"></div>
    </div>

    <!-- ===== OVERLAYS ===== -->
    <div id="overlayContainer">
        <!-- each overlay will be injected here by JS -->
    </div>

    <!-- ===== FOOTER ===== -->
    <div class="footer">
        <p>© 2026 MultiTool Pro · <a href="https://sites.google.com/view/multitool-pro/" target="_blank">Privacy Policy</a></p>
    </div>

    <script>
        // ============================================================
        //  DATA – all tools (keep exactly these)
        // ============================================================
        const TOOLS = [
            { id: 'calculator',    icon: '🧮', name: 'Calculator' },
            { id: 'password',      icon: '🔐', name: 'Password Gen' },
            { id: 'wordcount',     icon: '📝', name: 'Word Counter' },
            { id: 'caseconverter', icon: '🔤', name: 'Case Converter' },
            { id: 'colorpicker',   icon: '🎨', name: 'Color Picker' },
            { id: 'unitconverter', icon: '📏', name: 'Unit Converter' },
            { id: 'stopwatch',     icon: '⏱️', name: 'Stopwatch' },
            { id: 'qrcode',        icon: '📱', name: 'QR Code' },
            { id: 'bmi',           icon: '⚖️', name: 'BMI' },
            { id: 'random',        icon: '🎲', name: 'Random Number' },
            { id: 'countdown',     icon: '⏳', name: 'Countdown' },
            { id: 'datediff',      icon: '📅', name: 'Date Diff' },
            { id: 'base64',        icon: '🔣', name: 'Base64' },
            { id: 'urlencode',     icon: '🔗', name: 'URL Encode' },
            { id: 'jsonformat',    icon: '📋', name: 'JSON Formatter' },
            { id: 'lorem',         icon: '📄', name: 'Lorem Ipsum' },
            { id: 'currency',      icon: '💱', name: 'Currency' },
            { id: 'percentcalc',   icon: '📊', name: 'Percentage' },
            { id: 'agecalc',       icon: '🎂', name: 'Age' },
            { id: 'binhex',        icon: '💻', name: 'Binary/Hex' },
            { id: 'roman',         icon: '🏛️', name: 'Roman Numeral' },
            { id: 'tipcalc',       icon: '💰', name: 'Tip' },
            { id: 'worldclock',    icon: '🕐', name: 'World Clock' },
            { id: 'dice',          icon: '🎲', name: 'Dice Roller' },
            { id: 'coin',          icon: '🪙', name: 'Coin Flip' },
            { id: 'joke',          icon: '😂', name: 'Joke' },
            { id: 'ip',            icon: '🌍', name: 'IP Lookup' },
            // AI tools
            { id: 'ai_paraphraser', icon: '🔄', name: 'Paraphraser' },
            { id: 'ai_grammar',     icon: '✅', name: 'Grammar Check' },
            { id: 'ai_summarizer',  icon: '📄', name: 'Summarizer' },
            { id: 'ai_sentiment',   icon: '😊', name: 'Sentiment' },
            { id: 'ai_keywords',    icon: '🔑', name: 'Keywords' },
            { id: 'ai_readability', icon: '📖', name: 'Readability' },
            { id: 'premium_ai',     icon: '✨', name: 'AI Enhancer' },
        ];

        // Additional category overlays (opened via large cards)
        const CATEGORIES = [
            { id: 'convert',    icon: '🔄', name: 'CONVERT (PDF, Word, Image)' },
            { id: 'browsers',   icon: '🌐', name: 'Browsers' },
            { id: 'aitranslator', icon: '🌐🔤', name: 'All AI Translator' },
            { id: 'games',      icon: '🎮', name: 'Games' },
            { id: 'money',      icon: '💵', name: 'Money & Investments' },
            { id: 'remote',     icon: '🖥️', name: 'RDP, VPN & Web Preview' },
            { id: 'imagine',    icon: '✨', name: 'Imagine (25+ Tools)' },
            { id: 'online',     icon: '🌐', name: 'Online Tools' },
            { id: 'shortener',  icon: '🔗', name: 'URL Shorteners' },
            { id: 'other',      icon: '🧰', name: 'All Other Tools' },
            { id: 'ai_hub',     icon: '🤖', name: 'AI Hub' },
            { id: 'media',      icon: '📺', name: 'Media & Video' },
            { id: 'sites',      icon: '🌍', name: 'Popular Sites' },
            { id: 'tvradio',    icon: '📺📻', name: 'TV / Radio' },
            { id: 'emails',     icon: '📧', name: 'Free Emails' },
            { id: 'health',     icon: '🏋️', name: 'Health & Sports' },
            { id: 'misc',       icon: '🎵', name: 'Miscellaneous' },
            { id: 'travel',     icon: '✈️', name: 'Travel & Books' },
            { id: 'movies',     icon: '🎬', name: 'Movies & Series' },
            { id: 'fashion',    icon: '👗', name: 'Culture & Fashion' },
            { id: 'jobs',       icon: '💼', name: 'Jobs' },
            { id: 'tech',       icon: '💻', name: 'Tech' },
            { id: 'home',       icon: '🏠', name: 'Building & Home' },
            { id: 'surf',       icon: '🌊', name: 'Surf Internet' },
            { id: 'cooking',    icon: '🍳', name: 'Cooking & Kitchen' },
            { id: 'wilderness', icon: '🐋', name: 'Wilderness & Oceans' },
            { id: 'crypto',     icon: '₿', name: 'Crypto' },
            { id: 'news',       icon: '📰', name: 'News' },
        ];

        // ============================================================
        //  RENDER TOOLS GRID
        // ============================================================
        function renderTools() {
            const grid = document.getElementById('toolsGrid');
            let html = '';
            TOOLS.forEach(t => {
                html += `<div class="tool-card" data-id="${t.id}">
                    <div class="icon">${t.icon}</div>
                    <div class="name">${t.name}</div>
                </div>`;
            });
            // Add category cards as large cards
            CATEGORIES.forEach(c => {
                html += `<div class="tool-card large" data-id="cat_${c.id}">
                    <div class="icon">${c.icon}</div>
                    <div class="name">${c.name}</div>
                </div>`;
            });
            grid.innerHTML = html;

            // Click handlers
            grid.querySelectorAll('.tool-card').forEach(card => {
                card.addEventListener('click', function() {
                    const id = this.dataset.id;
                    if (id.startsWith('cat_')) {
                        const catId = id.replace('cat_', '');
                        openCategoryOverlay(catId);
                    } else {
                        selectTool(id);
                    }
                });
            });
        }

        // ============================================================
        //  SELECT TOOL (show panel)
        // ============================================================
        function selectTool(toolId) {
            const panel = document.getElementById('toolPanel');
            const title = document.getElementById('panelTitle');
            const content = document.getElementById('toolContent');

            // Find tool data
            const tool = TOOLS.find(t => t.id === toolId);
            if (!tool) {
                title.textContent = 'Tool not found';
                content.innerHTML = '';
                return;
            }
            title.textContent = `${tool.icon} ${tool.name}`;

            // Render tool-specific UI (simplified – just a placeholder for demonstration)
            // In a real app, you'd have full logic for each tool.
            // For brevity, we show a generic message.
            content.innerHTML = `
                <p style="margin-bottom: 12px;">Tool <strong>${tool.name}</strong> is ready.</p>
                <div style="background: var(--surface2); padding: 16px; border-radius: 16px; border: 1px solid var(--border);">
                    <em>Full functionality for ${tool.name} would go here.</em>
                    <br><br>
                    <button class="close-overlay" style="margin:0;" onclick="alert('Tool activated')">Use Tool</button>
                </div>
            `;

            panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // ============================================================
        //  CATEGORY OVERLAYS (dynamic)
        // ============================================================
        function openCategoryOverlay(catId) {
            // Simple alert for now – in production, you'd render a full overlay
            alert(`Opening category: ${catId}\n(Full overlay would show all relevant sites/tools)`);
        }

        // ============================================================
        //  INIT
        // ============================================================
        document.addEventListener('DOMContentLoaded', renderTools);
    </script>
</body>
</html>
