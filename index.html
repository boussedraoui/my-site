<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Procreate+ Studio 360°</title>
    <style>
        :root {
            --bg: #121212; --surface: #1e1e1e; --surface2: #2a2a2e;
            --border: #3a3a3c; --text: #e0e0e0; --accent: #ff6b6b; --accent2: #4ecdc4;
            --radius: 16px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Segoe UI', Roboto, sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; overflow: hidden; }
        #app { width: 100vw; height: 100vh; max-width: 1400px; max-height: 900px; display: flex; flex-direction: column; background: var(--bg); border-radius: 0; overflow: hidden; box-shadow: 0 0 40px rgba(0,0,0,0.8); }
        .topbar { display: flex; align-items: center; justify-content: space-between; padding: 8px 16px; background: var(--surface); border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 8px; }
        .topbar-left, .topbar-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .app-title { font-weight: 700; font-size: 20px; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-right: 12px; }
        button { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 8px 14px; border-radius: 24px; font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background 0.2s; white-space: nowrap; }
        button:hover { background: #38383d; }
        button.accent { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
        button.active { background: var(--accent2); border-color: var(--accent2); color: #000; }
        select { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 24px; font-size: 13px; cursor: pointer; outline: none; }
        .workspace { flex: 1; display: flex; overflow: hidden; position: relative; }
        .panel { background: var(--surface); border-right: 1px solid var(--border); padding: 12px; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; z-index: 5; transition: transform 0.3s; }
        .left-panel { width: 220px; }
        .right-panel { width: 220px; border-right: none; border-left: 1px solid var(--border); }
        .panel-section { background: var(--surface2); border-radius: var(--radius); padding: 12px; display: flex; flex-direction: column; gap: 8px; }
        .panel-title { font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.8px; color: #b0b0b0; }
        .tool-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .tool-item { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 8px 4px; display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 11px; cursor: pointer; color: #b0b0b0; transition: 0.2s; }
        .tool-item.active { background: var(--accent2); border-color: var(--accent2); color: #000; transform: scale(1.02); }
        .tool-icon { font-size: 22px; }
        input[type="color"] { width: 36px; height: 36px; border: 2px solid var(--border); border-radius: 50%; background: transparent; cursor: pointer; padding: 2px; }
        input[type="range"] { width: 100%; accent-color: var(--accent); }
        .slider-row { display: flex; align-items: center; gap: 8px; }
        .slider-row label { font-size: 12px; color: #b0b0b0; min-width: 45px; }
        .slider-row span { font-size: 12px; color: var(--text); min-width: 28px; text-align: center; }
        .canvas-container { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; background: #2c2c2e; overflow: hidden; }
        canvas#mainCanvas { background: white; box-shadow: 0 0 30px rgba(0,0,0,0.5); max-width: 100%; max-height: 100%; touch-action: none; }
        canvas#previewCanvas { position: absolute; pointer-events: none; top: 50%; left: 50%; transform: translate(-50%, -50%); touch-action: none; }
        #threeContainer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; }
        .layer-list { display: flex; flex-direction: column; gap: 4px; max-height: 250px; overflow-y: auto; }
        .layer-item { display: flex; align-items: center; justify-content: space-between; background: #3a3a3c; padding: 8px 10px; border-radius: 10px; cursor: pointer; font-size: 13px; color: #fff; border: 1px solid transparent; }
        .layer-item.active-layer { border-color: var(--accent); background: #555; }
        .layer-item .visibility-toggle { margin-left: 8px; font-size: 16px; cursor: pointer; }
        .layer-actions { display: flex; gap: 4px; margin-top: 8px; flex-wrap: wrap; }
        .panel-toggle { display: none; position: absolute; top: 60px; z-index: 10; background: var(--surface2); border: 1px solid var(--border); border-radius: 0 12px 12px 0; padding: 10px; cursor: pointer; font-size: 20px; }
        .left-toggle { left: 0; } .right-toggle { right: 0; border-radius: 12px 0 0 12px; }
        @media (max-width: 900px) {
            .left-panel, .right-panel { position: absolute; top: 0; bottom: 0; width: 240px; transition: transform 0.3s; }
            .left-panel { left: 0; transform: translateX(-100%); }
            .right-panel { right: 0; transform: translateX(100%); }
            .left-panel.open { transform: translateX(0); }
            .right-panel.open { transform: translateX(0); }
            .panel-toggle { display: block; }
        }
        .fullscreen-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: black; z-index:200; display:none; flex-direction:column; align-items:center; justify-content:center; }
        .fullscreen-overlay.active { display: flex; }
        .fullscreen-canvas-container { width:100%; height:100%; display:flex; align-items:center; justify-content:center; }
        .controls-bar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            align-items: center;
            gap: 10px;
            background: rgba(30,30,30,0.85);
            backdrop-filter: blur(10px);
            padding: 10px 16px;
            border-radius: 30px;
            z-index: 30;
            max-width: calc(100vw - 30px);
            overflow-x: auto;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
        }
        .controls-bar.visible { display: flex; }
        .controls-bar label { color: var(--text); font-size: 12px; }
        #rotateSpeed { width: 100px; min-width: 80px; }
        #speedDisplay { color: var(--text); min-width: 32px; text-align: center; }
        #uploadInput { display: none; }
    </style>
</head>
<body>
<div id="app">
    <div class="topbar">
        <div class="topbar-left">
            <span class="app-title">Procreate+ Studio</span>
            <button id="newBtn">📄 New</button>
            <button id="saveDraftBtn">💾 Save Draft</button>
            <button id="loadDraftBtn">📂 Load Draft</button>
            <button id="uploadBtn">📁 Upload</button>
            <input type="file" id="uploadInput" accept="image/*, .svg, .pdf">
            <button id="toggle3D" class="accent">🌐 3D / 360°</button>
            <button id="fullscreenBtn" title="Fullscreen">⛶</button>
            <!-- Robust Download Button -->
            <button id="downloadBtn">⬇️ Download</button>
        </div>
        <div class="topbar-right">
            <button id="leftPanelToggle" class="panel-toggle left-toggle">☰</button>
            <button id="rightPanelToggle" class="panel-toggle right-toggle">☰</button>
        </div>
    </div>

    <div class="workspace">
        <div class="panel left-panel" id="leftPanel">
            <div class="panel-section">
                <div class="panel-title">Tools</div>
                <div class="tool-grid" id="toolsGrid">
                    <div class="tool-item active" data-tool="brush"><span class="tool-icon">🖌️</span>Brush</div>
                    <div class="tool-item" data-tool="eraser"><span class="tool-icon">🧽</span>Eraser</div>
                    <div class="tool-item" data-tool="line"><span class="tool-icon">📏</span>Line</div>
                    <div class="tool-item" data-tool="rect"><span class="tool-icon">▭</span>Rect</div>
                    <div class="tool-item" data-tool="circle"><span class="tool-icon">⭕</span>Circle</div>
                    <div class="tool-item" data-tool="fill"><span class="tool-icon">🪣</span>Fill</div>
                    <div class="tool-item" data-tool="eyedropper"><span class="tool-icon">💧</span>Pick</div>
                </div>
            </div>
            <div class="panel-section">
                <div class="panel-title">Brush</div>
                <div class="slider-row"><label>Size</label><input type="range" id="brushSize" min="1" max="60" value="12"><span id="sizeValue">12</span></div>
                <div class="slider-row"><label>Opacity</label><input type="range" id="brushOpacity" min="0.1" max="1" step="0.1" value="1"><span id="opacityValue">100%</span></div>
                <label style="font-size:12px; color:#b0b0b0;">Color</label>
                <input type="color" id="colorPicker" value="#000000">
            </div>
        </div>

        <div class="canvas-container" id="canvasContainer">
            <canvas id="mainCanvas"></canvas>
            <canvas id="previewCanvas"></canvas>
            <div id="threeContainer"></div>
            <div id="controlsBar" class="controls-bar">
                <button id="autoRotateBtn">🔄 Auto</button>
                <label>Slow</label>
                <input type="range" id="rotateSpeed" min="0.2" max="5" step="0.1" value="1">
                <label>Fast</label>
                <span id="speedDisplay">1×</span>
                <button id="wireframeBtn">🔍 Wire</button>
                <button id="resetViewBtn">↺ Reset</button>
            </div>
        </div>

        <div class="panel right-panel" id="rightPanel">
            <div class="panel-section">
                <div class="panel-title">Layers</div>
                <div class="layer-list" id="layerList"></div>
                <div class="layer-actions">
                    <button id="addLayerBtn">➕ Add</button>
                    <button id="deleteLayerBtn">🗑️ Del</button>
                    <button id="mergeDownBtn">⬇️ Merge</button>
                    <button id="duplicateLayerBtn">📋 Dup</button>
                    <button id="layerUndoBtn" title="Undo last action" style="margin-top:8px;">↩ Undo</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="fullscreen-overlay" id="fullscreenOverlay">
    <div class="fullscreen-canvas-container" id="fullscreenCanvasContainer">
        <canvas id="fullscreenCanvas" style="background:white; box-shadow:0 0 30px rgba(0,0,0,0.5); touch-action:none;"></canvas>
    </div>
    <button id="exitFullscreenBtn" style="position:absolute; top:10px; right:10px; background:#2a2a2e; color:white; border:none; padding:8px 16px; border-radius:12px; cursor:pointer;">✕ Exit Fullscreen</button>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.128.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/" } }
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ---------- DOM ----------
const mainCanvas = document.getElementById('mainCanvas');
const ctx = mainCanvas.getContext('2d');
const previewCanvas = document.getElementById('previewCanvas');
const pctx = previewCanvas.getContext('2d');
const container = document.getElementById('canvasContainer');
const threeContainer = document.getElementById('threeContainer');
const toggle3DBtn = document.getElementById('toggle3D');
const controlsBar = document.getElementById('controlsBar');

const leftPanel = document.getElementById('leftPanel');
const rightPanel = document.getElementById('rightPanel');
const leftToggle = document.getElementById('leftPanelToggle');
const rightToggle = document.getElementById('rightPanelToggle');

const toolItems = document.querySelectorAll('.tool-item');
let currentTool = 'brush';
const brushSizeInput = document.getElementById('brushSize');
const brushOpacityInput = document.getElementById('brushOpacity');
const colorPicker = document.getElementById('colorPicker');
const sizeValue = document.getElementById('sizeValue');
const opacityValue = document.getElementById('opacityValue');
let brushSize = 12;
let brushOpacity = 1;
let currentColor = '#000000';

let layers = [];
let activeLayerIndex = 0;
const layerListDiv = document.getElementById('layerList');

let undoStack = [];
let redoStack = [];
const MAX_UNDO = 40;

let isDrawing = false;
let startX = 0, startY = 0, lastX = 0, lastY = 0;
let shapePreview = null;

let is3D = false;
let renderer3D, scene3D, camera3D, sphereMesh, texture3D, controls3D;
let raycaster = new THREE.Raycaster();
let autoRotate = false, wireframeMode = false, rotateSpeedVal = 1;

let isFullscreen = false;
const fullscreenOverlay = document.getElementById('fullscreenOverlay');
const fullscreenCanvas = document.getElementById('fullscreenCanvas');
const fullscreenCtx = fullscreenCanvas.getContext('2d');

// ---------- Canvas sizing ----------
function resizeCanvas() {
    const w = container.clientWidth - 20;
    const h = container.clientHeight - 20;
    const size = Math.min(w, h, 1000);
    mainCanvas.width = size; mainCanvas.height = size;
    previewCanvas.width = size; previewCanvas.height = size;
    previewCanvas.style.width = size + 'px'; previewCanvas.style.height = size + 'px';
    if (layers.length === 0) newCanvas();
    else { layers.forEach(l => { l.canvas.width = size; l.canvas.height = size; }); compositeLayers(); }
    if (is3D && renderer3D) {
        renderer3D.setSize(container.clientWidth, container.clientHeight);
        camera3D.aspect = container.clientWidth / container.clientHeight;
        camera3D.updateProjectionMatrix();
        update3DTexture();
    }
}
window.addEventListener('resize', resizeCanvas);
window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 50));

// ---------- Layers ----------
function createLayerCanvas(w, h, fillWhite = false) {
    const c = document.createElement('canvas');
    c.width = w; c.height = h;
    const cctx = c.getContext('2d');
    if (fillWhite) { cctx.fillStyle = '#ffffff'; cctx.fillRect(0, 0, w, h); }
    return c;
}

function newCanvas() {
    const w = mainCanvas.width, h = mainCanvas.height;
    layers = [{ canvas: createLayerCanvas(w, h, true), name: 'Layer 1', visible: true }];
    activeLayerIndex = 0;
    undoStack = []; redoStack = [];
    saveSnapshot(); renderLayerList(); compositeLayers();
}

function saveSnapshot() {
    const snapshot = layers.map(l => l.canvas.toDataURL());
    undoStack.push(snapshot);
    if (undoStack.length > MAX_UNDO) undoStack.shift();
    redoStack = [];
}

function restoreSnapshot(snapshot) {
    layers = snapshot.map((dataURL, i) => ({
        canvas: createLayerCanvas(mainCanvas.width, mainCanvas.height, false),
        name: layers[i]?.name || `Layer ${i+1}`, visible: true
    }));
    let loaded = 0;
    layers.forEach((layer, idx) => {
        const img = new Image();
        img.onload = () => {
            layer.canvas.getContext('2d').drawImage(img, 0, 0);
            loaded++;
            if (loaded === layers.length) { compositeLayers(); renderLayerList(); }
        };
        img.src = snapshot[idx];
    });
    if (activeLayerIndex >= layers.length) activeLayerIndex = layers.length - 1;
}

function undo() {
    if (undoStack.length <= 1) return;
    redoStack.push(undoStack.pop());
    restoreSnapshot(undoStack[undoStack.length - 1]);
}

function redo() {
    if (redoStack.length === 0) return;
    const snapshot = redoStack.pop();
    undoStack.push(snapshot);
    restoreSnapshot(snapshot);
}

function compositeLayers() {
    ctx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
    layers.forEach(l => { if (l.visible) ctx.drawImage(l.canvas, 0, 0); });
    if (is3D && texture3D) texture3D.needsUpdate = true;
    if (isFullscreen) compositeLayersToFullscreen();
}

// Layer list rendering – SELECTION DOES NOT HIDE OTHER LAYERS
function renderLayerList() {
    layerListDiv.innerHTML = '';
    layers.forEach((layer, i) => {
        const div = document.createElement('div');
        div.className = 'layer-item' + (i === activeLayerIndex ? ' active-layer' : '');
        const nameSpan = document.createElement('span');
        nameSpan.textContent = layer.name;
        const visBtn = document.createElement('span');
        visBtn.className = 'visibility-toggle';
        visBtn.textContent = layer.visible ? '👁' : '❌';
        visBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            layer.visible = !layer.visible;
            compositeLayers();
            renderLayerList();
        });
        div.appendChild(nameSpan);
        div.appendChild(visBtn);
        div.addEventListener('click', () => {
            activeLayerIndex = i;   // only changes active layer, does not hide others
            compositeLayers();
            renderLayerList();
        });
        layerListDiv.appendChild(div);
    });
}

function getActiveLayerCanvas() { return layers[activeLayerIndex]?.canvas; }

// ---------- Tools ----------
function setActiveTool(tool) {
    currentTool = tool;
    toolItems.forEach(item => item.classList.remove('active'));
    document.querySelector(`.tool-item[data-tool="${tool}"]`).classList.add('active');
    shapePreview = null;
    clearPreview();
}
toolItems.forEach(item => item.addEventListener('click', () => setActiveTool(item.dataset.tool)));

function getPos(e, canvas = mainCanvas) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    let clientX, clientY;
    if (e.touches) { clientX = e.touches[0].clientX; clientY = e.touches[0].clientY; }
    else { clientX = e.clientX; clientY = e.clientY; }
    return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
}
function clearPreview() { pctx.clearRect(0, 0, previewCanvas.width, previewCanvas.height); }

function drawShapePreview() {
    if (!shapePreview || !isDrawing) return;
    clearPreview();
    const { type, x0, y0, x1, y1 } = shapePreview;
    pctx.strokeStyle = currentColor;
    pctx.lineWidth = brushSize;
    pctx.globalAlpha = brushOpacity;
    pctx.setLineDash([6, 4]);
    if (type === 'line') { pctx.beginPath(); pctx.moveTo(x0, y0); pctx.lineTo(x1, y1); pctx.stroke(); }
    else if (type === 'rect') pctx.strokeRect(x0, y0, x1 - x0, y1 - y0);
    else if (type === 'circle') {
        const rx = Math.abs(x1 - x0) / 2, ry = Math.abs(y1 - y0) / 2;
        pctx.beginPath(); pctx.ellipse((x0+x1)/2, (y0+y1)/2, rx, ry, 0, 0, Math.PI*2); pctx.stroke();
    }
    pctx.setLineDash([]); pctx.globalAlpha = 1;
}

function startDrawAt(x, y) {
    isDrawing = true;
    saveSnapshot();
    startX = x; startY = y; lastX = x; lastY = y;
    if (currentTool === 'brush' || currentTool === 'eraser') {
        const lctx = getActiveLayerCanvas().getContext('2d');
        lctx.beginPath(); lctx.moveTo(lastX, lastY);
    } else if (['line','rect','circle'].includes(currentTool)) {
        shapePreview = { type: currentTool, x0: startX, y0: startY, x1: startX, y1: startY };
    } else if (currentTool === 'fill') {
        floodFill(Math.floor(startX), Math.floor(startY));
        isDrawing = false; compositeLayers();
    } else if (currentTool === 'eyedropper') {
        compositeLayers();
        pickColor(Math.floor(x), Math.floor(y));
        isDrawing = false;
    }
}

function drawAt(x, y) {
    if (!isDrawing) return;
    if (currentTool === 'brush' || currentTool === 'eraser') {
        const lctx = getActiveLayerCanvas().getContext('2d');
        lctx.lineWidth = brushSize;
        lctx.lineCap = 'round'; lctx.lineJoin = 'round';
        lctx.globalAlpha = brushOpacity;
        lctx.globalCompositeOperation = (currentTool === 'eraser') ? 'destination-out' : 'source-over';
        if (currentTool !== 'eraser') lctx.strokeStyle = currentColor;
        lctx.beginPath(); lctx.moveTo(lastX, lastY); lctx.lineTo(x, y); lctx.stroke();
        lastX = x; lastY = y;
        compositeLayers();
    } else if (['line','rect','circle'].includes(currentTool)) {
        shapePreview.x1 = x; shapePreview.y1 = y;
        drawShapePreview();
    }
}

function endDrawAt() {
    if (!isDrawing) return;
    isDrawing = false;
    if (currentTool === 'brush' || currentTool === 'eraser') {
        const lctx = getActiveLayerCanvas().getContext('2d');
        lctx.closePath();
        lctx.globalCompositeOperation = 'source-over'; lctx.globalAlpha = 1;
        compositeLayers();
    } else if (shapePreview) {
        clearPreview();
        const lctx = getActiveLayerCanvas().getContext('2d');
        lctx.globalAlpha = brushOpacity;
        lctx.strokeStyle = currentColor; lctx.lineWidth = brushSize;
        const { type, x0, y0, x1, y1 } = shapePreview;
        if (type === 'line') { lctx.beginPath(); lctx.moveTo(x0, y0); lctx.lineTo(x1, y1); lctx.stroke(); }
        else if (type === 'rect') lctx.strokeRect(x0, y0, x1 - x0, y1 - y0);
        else if (type === 'circle') {
            const rx = Math.abs(x1 - x0) / 2, ry = Math.abs(y1 - y0) / 2;
            lctx.beginPath(); lctx.ellipse((x0+x1)/2, (y0+y1)/2, rx, ry, 0, 0, Math.PI*2); lctx.stroke();
        }
        lctx.globalAlpha = 1;
        shapePreview = null;
        compositeLayers();
    }
}

function startDraw(e) { e.preventDefault(); const pos = getPos(e); startDrawAt(pos.x, pos.y); }
function draw(e) { if (!isDrawing) return; e.preventDefault(); const pos = getPos(e); drawAt(pos.x, pos.y); }
function endDraw(e) { if (!isDrawing) return; isDrawing = false; endDrawAt(); }

function startDraw3D(e) {
    e.preventDefault();
    if (!is3D || (currentTool !== 'brush' && currentTool !== 'eraser')) return;
    const rect = renderer3D.domElement.getBoundingClientRect();
    const x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    const y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    const mouse = new THREE.Vector2(x, y);
    raycaster.setFromCamera(mouse, camera3D);
    const intersects = raycaster.intersectObject(sphereMesh);
    if (intersects.length > 0) {
        const uv = intersects[0].uv;
        startDrawAt(uv.x * mainCanvas.width, (1 - uv.y) * mainCanvas.height);
    }
}
function draw3D(e) {
    if (!isDrawing || !is3D) return;
    e.preventDefault();
    const rect = renderer3D.domElement.getBoundingClientRect();
    const x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    const y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    const mouse = new THREE.Vector2(x, y);
    raycaster.setFromCamera(mouse, camera3D);
    const intersects = raycaster.intersectObject(sphereMesh);
    if (intersects.length > 0) {
        const uv = intersects[0].uv;
        drawAt(uv.x * mainCanvas.width, (1 - uv.y) * mainCanvas.height);
    }
}
function endDraw3D(e) { if (!isDrawing) return; isDrawing = false; compositeLayers(); }

mainCanvas.addEventListener('mousedown', startDraw);
mainCanvas.addEventListener('mousemove', draw);
mainCanvas.addEventListener('mouseup', endDraw);
mainCanvas.addEventListener('mouseleave', endDraw);
mainCanvas.addEventListener('touchstart', startDraw, { passive: false });
mainCanvas.addEventListener('touchmove', draw, { passive: false });
mainCanvas.addEventListener('touchend', endDraw);
mainCanvas.addEventListener('touchcancel', endDraw);

// ---------- Eyedropper ----------
function pickColor(x, y) {
    x = Math.min(Math.max(0, x), mainCanvas.width - 1);
    y = Math.min(Math.max(0, y), mainCanvas.height - 1);
    const pixel = ctx.getImageData(x, y, 1, 1).data;
    const r = pixel[0], g = pixel[1], b = pixel[2];
    const hex = '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
    colorPicker.value = hex;
    currentColor = hex;
}

// ---------- Flood fill ----------
function floodFill(sx, sy) {
    const layerCanvas = getActiveLayerCanvas();
    if (!layerCanvas) return;
    const lctx = layerCanvas.getContext('2d');
    const imageData = lctx.getImageData(0, 0, layerCanvas.width, layerCanvas.height);
    const data = imageData.data, w = layerCanvas.width, h = layerCanvas.height;
    const startIdx = (sy * w + sx) * 4;
    const sr = data[startIdx], sg = data[startIdx+1], sb = data[startIdx+2], sa = data[startIdx+3];
    const fillR = parseInt(currentColor.slice(1,3), 16);
    const fillG = parseInt(currentColor.slice(3,5), 16);
    const fillB = parseInt(currentColor.slice(5,7), 16);
    const fillA = Math.round(brushOpacity * 255);
    if (sr === fillR && sg === fillG && sb === fillB && sa === fillA) return;
    const stack = [[sx, sy]];
    const visited = new Uint8Array(w * h);
    const idx = (y, x) => (y * w + x) * 4;
    while (stack.length) {
        const [x, y] = stack.pop();
        if (x < 0 || x >= w || y < 0 || y >= h) continue;
        const pixelIdx = y * w + x;
        if (visited[pixelIdx]) continue;
        const p = idx(y, x);
        if (data[p] !== sr || data[p+1] !== sg || data[p+2] !== sb || data[p+3] !== sa) continue;
        visited[pixelIdx] = 1;
        data[p] = fillR; data[p+1] = fillG; data[p+2] = fillB; data[p+3] = fillA;
        stack.push([x+1, y], [x-1, y], [x, y+1], [x, y-1]);
    }
    lctx.putImageData(imageData, 0, 0);
}

// ---------- Fullscreen ----------
function compositeLayersToFullscreen() {
    fullscreenCtx.clearRect(0, 0, fullscreenCanvas.width, fullscreenCanvas.height);
    const scale = Math.min(fullscreenCanvas.width/mainCanvas.width, fullscreenCanvas.height/mainCanvas.height);
    const dx = (fullscreenCanvas.width - mainCanvas.width * scale) / 2;
    const dy = (fullscreenCanvas.height - mainCanvas.height * scale) / 2;
    layers.forEach(l => { if (l.visible) fullscreenCtx.drawImage(l.canvas, dx, dy, mainCanvas.width*scale, mainCanvas.height*scale); });
}
function mapFullscreenCoords(clientX, clientY) {
    const rect = fullscreenCanvas.getBoundingClientRect();
    const fx = (clientX - rect.left) / rect.width * fullscreenCanvas.width;
    const fy = (clientY - rect.top) / rect.height * fullscreenCanvas.height;
    const scale = Math.min(fullscreenCanvas.width/mainCanvas.width, fullscreenCanvas.height/mainCanvas.height);
    const dx = (fullscreenCanvas.width - mainCanvas.width*scale)/2, dy = (fullscreenCanvas.height - mainCanvas.height*scale)/2;
    return { x: (fx - dx)/scale, y: (fy - dy)/scale };
}
function fsStart(e) { e.preventDefault(); const {x,y}=mapFullscreenCoords(e.touches?e.touches[0].clientX:e.clientX, e.touches?e.touches[0].clientY:e.clientY); startDrawAt(x,y); }
function fsMove(e) { if(!isDrawing)return; e.preventDefault(); const {x,y}=mapFullscreenCoords(e.touches?e.touches[0].clientX:e.clientX, e.touches?e.touches[0].clientY:e.clientY); drawAt(x,y); }
function fsEnd() { endDrawAt(); }
function enterFullscreen() {
    isFullscreen = true;
    fullscreenOverlay.classList.add('active');
    fullscreenCanvas.width = window.innerWidth;
    fullscreenCanvas.height = window.innerHeight;
    compositeLayersToFullscreen();
    fullscreenCanvas.addEventListener('mousedown', fsStart);
    fullscreenCanvas.addEventListener('mousemove', fsMove);
    fullscreenCanvas.addEventListener('mouseup', fsEnd);
    fullscreenCanvas.addEventListener('mouseleave', fsEnd);
    fullscreenCanvas.addEventListener('touchstart', fsStart, { passive: false });
    fullscreenCanvas.addEventListener('touchmove', fsMove, { passive: false });
    fullscreenCanvas.addEventListener('touchend', fsEnd);
    fullscreenCanvas.addEventListener('touchcancel', fsEnd);
}
function exitFullscreen() {
    isFullscreen = false;
    fullscreenOverlay.classList.remove('active');
    fullscreenCanvas.removeEventListener('mousedown', fsStart);
    fullscreenCanvas.removeEventListener('mousemove', fsMove);
    fullscreenCanvas.removeEventListener('mouseup', fsEnd);
    fullscreenCanvas.removeEventListener('mouseleave', fsEnd);
    fullscreenCanvas.removeEventListener('touchstart', fsStart);
    fullscreenCanvas.removeEventListener('touchmove', fsMove);
    fullscreenCanvas.removeEventListener('touchend', fsEnd);
    fullscreenCanvas.removeEventListener('touchcancel', fsEnd);
}
document.getElementById('fullscreenBtn').addEventListener('click', enterFullscreen);
document.getElementById('exitFullscreenBtn').addEventListener('click', exitFullscreen);
const _compositeLayers = compositeLayers;
compositeLayers = function() { _compositeLayers(); if (isFullscreen) compositeLayersToFullscreen(); };

// ---------- 3D Mode ----------
function init3D() {
    renderer3D = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer3D.setPixelRatio(window.devicePixelRatio);
    renderer3D.setSize(container.clientWidth, container.clientHeight);
    threeContainer.innerHTML = '';
    threeContainer.appendChild(renderer3D.domElement);
    scene3D = new THREE.Scene();
    camera3D = new THREE.PerspectiveCamera(45, container.clientWidth/container.clientHeight, 0.1, 1000);
    camera3D.position.set(0, 0, 5);
    controls3D = new OrbitControls(camera3D, renderer3D.domElement);
    controls3D.enableDamping = true; controls3D.dampingFactor = 0.05;
    controls3D.rotateSpeed = 0.8;
    controls3D.autoRotate = autoRotate;
    controls3D.autoRotateSpeed = rotateSpeedVal;
    const geom = new THREE.SphereGeometry(2, 64, 64);
    texture3D = new THREE.CanvasTexture(mainCanvas);
    sphereMesh = new THREE.Mesh(geom, new THREE.MeshStandardMaterial({ map: texture3D, wireframe: wireframeMode }));
    scene3D.add(sphereMesh);
    scene3D.add(new THREE.AmbientLight(0xffffff, 0.5));
    const dir = new THREE.DirectionalLight(0xffffff, 0.5); dir.position.set(1,1,1); scene3D.add(dir);
    renderer3D.domElement.addEventListener('mousedown', startDraw3D);
    renderer3D.domElement.addEventListener('mousemove', draw3D);
    renderer3D.domElement.addEventListener('mouseup', endDraw3D);
    renderer3D.domElement.addEventListener('mouseleave', endDraw3D);
    renderer3D.domElement.addEventListener('touchstart', startDraw3D, { passive: false });
    renderer3D.domElement.addEventListener('touchmove', draw3D, { passive: false });
    renderer3D.domElement.addEventListener('touchend', endDraw3D);
    renderer3D.domElement.addEventListener('touchcancel', endDraw3D);
    animate3D();
}
function remove3DListeners() {
    if (!renderer3D) return;
    renderer3D.domElement.removeEventListener('mousedown', startDraw3D);
    renderer3D.domElement.removeEventListener('mousemove', draw3D);
    renderer3D.domElement.removeEventListener('mouseup', endDraw3D);
    renderer3D.domElement.removeEventListener('mouseleave', endDraw3D);
    renderer3D.domElement.removeEventListener('touchstart', startDraw3D);
    renderer3D.domElement.removeEventListener('touchmove', draw3D);
    renderer3D.domElement.removeEventListener('touchend', endDraw3D);
    renderer3D.domElement.removeEventListener('touchcancel', endDraw3D);
}
function animate3D() { if (!is3D) return; requestAnimationFrame(animate3D); controls3D.update(); renderer3D.render(scene3D, camera3D); }
function update3DTexture() { if (texture3D) texture3D.needsUpdate = true; }

function enable3D() {
    is3D = true;
    if (leftPanel.classList.contains('open')) leftPanel.classList.remove('open');
    if (rightPanel.classList.contains('open')) rightPanel.classList.remove('open');
    leftPanel.style.transform = 'translateX(-100%)';
    rightPanel.style.transform = 'translateX(100%)';
    mainCanvas.style.display = 'none';
    previewCanvas.style.display = 'none';
    threeContainer.style.display = 'block';
    controlsBar.classList.add('visible');
    if (!renderer3D) init3D();
    else {
        renderer3D.setSize(container.clientWidth, container.clientHeight);
        camera3D.aspect = container.clientWidth / container.clientHeight;
        camera3D.updateProjectionMatrix();
        texture3D.needsUpdate = true;
        remove3DListeners();
        renderer3D.domElement.addEventListener('mousedown', startDraw3D);
        renderer3D.domElement.addEventListener('mousemove', draw3D);
        renderer3D.domElement.addEventListener('mouseup', endDraw3D);
        renderer3D.domElement.addEventListener('mouseleave', endDraw3D);
        renderer3D.domElement.addEventListener('touchstart', startDraw3D, { passive: false });
        renderer3D.domElement.addEventListener('touchmove', draw3D, { passive: false });
        renderer3D.domElement.addEventListener('touchend', endDraw3D);
        renderer3D.domElement.addEventListener('touchcancel', endDraw3D);
    }
    toggle3DBtn.classList.add('active');
    toggle3DBtn.innerHTML = '<span>🌐</span> 2D';
    compositeLayers();
}

function disable3D() {
    is3D = false;
    mainCanvas.style.display = 'block';
    previewCanvas.style.display = 'block';
    threeContainer.style.display = 'none';
    controlsBar.classList.remove('visible');
    leftPanel.style.transform = '';
    rightPanel.style.transform = '';
    remove3DListeners();
    toggle3DBtn.classList.remove('active');
    toggle3DBtn.innerHTML = '<span>🌐</span> 3D / 360°';
}
toggle3DBtn.addEventListener('click', () => { if (is3D) disable3D(); else enable3D(); });

// 3D controls
document.getElementById('autoRotateBtn').addEventListener('click', () => {
    autoRotate = !autoRotate;
    if (controls3D) controls3D.autoRotate = autoRotate;
    document.getElementById('autoRotateBtn').style.background = autoRotate ? 'var(--accent2)' : 'var(--surface2)';
});
const speedSlider = document.getElementById('rotateSpeed');
const speedDisplay = document.getElementById('speedDisplay');
speedSlider.addEventListener('input', (e) => {
    rotateSpeedVal = parseFloat(e.target.value);
    if (controls3D) controls3D.autoRotateSpeed = rotateSpeedVal;
    speedDisplay.textContent = rotateSpeedVal.toFixed(1) + '×';
});
document.getElementById('wireframeBtn').addEventListener('click', () => {
    wireframeMode = !wireframeMode;
    if (sphereMesh) sphereMesh.material.wireframe = wireframeMode;
    document.getElementById('wireframeBtn').style.background = wireframeMode ? 'var(--accent2)' : 'var(--surface2)';
});
document.getElementById('resetViewBtn').addEventListener('click', () => {
    if (controls3D) { controls3D.reset(); camera3D.position.set(0,0,5); }
});

// ---------- Upload ----------
document.getElementById('uploadBtn').addEventListener('click', ()=> document.getElementById('uploadInput').click());
document.getElementById('uploadInput').addEventListener('change', function(e) {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    if (file.type.startsWith('image/') || file.name.endsWith('.svg')) {
        reader.onload = ev => {
            const img = new Image();
            img.onload = () => {
                const w=mainCanvas.width, h=mainCanvas.height;
                const lc = createLayerCanvas(w, h, false);
                const lctx = lc.getContext('2d');
                const scale = Math.min(w/img.width, h/img.height, 1);
                lctx.drawImage(img, (w-img.width*scale)/2, (h-img.height*scale)/2, img.width*scale, img.height*scale);
                saveSnapshot();
                layers.push({ canvas: lc, name: 'Imported', visible: true });
                activeLayerIndex = layers.length-1;
                renderLayerList(); compositeLayers();
                this.value = '';
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
    } else if (file.type === 'application/pdf' || file.name.endsWith('.pdf')) {
        if (typeof pdfjsLib === 'undefined') {
            const s = document.createElement('script'); s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js';
            s.onload = ()=>{ pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js'; loadPDF(file); };
            document.head.appendChild(s);
        } else loadPDF(file);
    } else alert('Unsupported file');
});
function loadPDF(file) {
    const fr = new FileReader();
    fr.onload = function() {
        pdfjsLib.getDocument(new Uint8Array(this.result)).promise.then(pdf=> pdf.getPage(1)).then(page=> {
            const vp = page.getViewport({scale:1});
            const c = document.createElement('canvas'); c.width=vp.width; c.height=vp.height;
            page.render({canvasContext:c.getContext('2d'), viewport:vp}).promise.then(()=>{
                const img = new Image();
                img.onload = ()=>{
                    const w=mainCanvas.width, h=mainCanvas.height;
                    const lc = createLayerCanvas(w, h, false);
                    const lctx = lc.getContext('2d');
                    const scale = Math.min(w/img.width, h/img.height, 1);
                    lctx.drawImage(img, (w-img.width*scale)/2, (h-img.height*scale)/2, img.width*scale, img.height*scale);
                    saveSnapshot();
                    layers.push({ canvas: lc, name: 'PDF', visible: true });
                    activeLayerIndex = layers.length-1;
                    renderLayerList(); compositeLayers();
                };
                img.src = c.toDataURL();
            });
        }).catch(()=> alert('PDF error'));
    };
    fr.readAsArrayBuffer(file);
}

// ---------- DOWNLOAD (robust, works on all platforms) ----------
document.getElementById('downloadBtn').addEventListener('click', () => {
    try {
        const dataUrl = mainCanvas.toDataURL('image/png');
        // For modern browsers, use a temporary anchor
        const link = document.createElement('a');
        link.href = dataUrl;
        link.download = 'drawing.png';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    } catch (e) {
        // Fallback: open in a new tab (works everywhere)
        const dataUrl = mainCanvas.toDataURL('image/png');
        const win = window.open('', '_blank');
        if (win) {
            win.document.write('<img src="' + dataUrl + '" style="max-width:100%;"><br><p>Right-click / long-press the image and choose "Save image as…"</p>');
        } else {
            alert('Download blocked by pop-up. Please allow pop-ups for this site.');
        }
    }
});

// ---------- Settings ----------
brushSizeInput.addEventListener('input', ()=>{ brushSize=parseInt(brushSizeInput.value); sizeValue.textContent=brushSize; });
brushOpacityInput.addEventListener('input', ()=>{ brushOpacity=parseFloat(brushOpacityInput.value); opacityValue.textContent=Math.round(brushOpacity*100)+'%'; });
colorPicker.addEventListener('input', ()=>{ currentColor=colorPicker.value; });

// ---------- Layer actions (Merge down, professional) ----------
document.getElementById('addLayerBtn').addEventListener('click', ()=>{
    saveSnapshot();
    layers.push({ canvas: createLayerCanvas(mainCanvas.width, mainCanvas.height, true), name: `Layer ${layers.length+1}`, visible: true });
    activeLayerIndex = layers.length-1;
    renderLayerList(); compositeLayers();
});

document.getElementById('deleteLayerBtn').addEventListener('click', ()=>{
    if (layers.length<=1) return;
    saveSnapshot();
    layers.splice(activeLayerIndex, 1);
    if (activeLayerIndex>=layers.length) activeLayerIndex = layers.length-1;
    renderLayerList(); compositeLayers();
});

// Merge down: merges active layer into the one below, deleting the active layer
document.getElementById('mergeDownBtn').addEventListener('click', ()=>{
    if (activeLayerIndex === 0 || layers.length < 2) {
        alert('Select a layer above the bottom one to merge down.');
        return;
    }
    saveSnapshot(); // save state before merging
    const upper = layers[activeLayerIndex].canvas;
    const lower = layers[activeLayerIndex - 1].canvas;
    // Merge upper onto lower
    lower.getContext('2d').drawImage(upper, 0, 0);
    // Remove the upper layer
    layers.splice(activeLayerIndex, 1);
    activeLayerIndex--; // now the merged lower layer becomes active
    renderLayerList(); compositeLayers();
});

document.getElementById('duplicateLayerBtn').addEventListener('click', ()=>{
    saveSnapshot();
    const src = layers[activeLayerIndex].canvas;
    const dup = createLayerCanvas(mainCanvas.width, mainCanvas.height, false);
    dup.getContext('2d').drawImage(src, 0, 0);
    const newName = `${layers[activeLayerIndex].name} copy`;
    layers.splice(activeLayerIndex+1, 0, { canvas: dup, name: newName, visible: true });
    activeLayerIndex++;
    renderLayerList(); compositeLayers();
});

// Undo button (reverts merge and any other layer actions)
document.getElementById('layerUndoBtn').addEventListener('click', () => { undo(); });

// Keyboard undo/redo
document.addEventListener('keydown', e => {
    if (e.ctrlKey && e.key==='z') { e.preventDefault(); undo(); }
    else if (e.ctrlKey && e.key==='y') { e.preventDefault(); redo(); }
});

// New / Drafts
document.getElementById('newBtn').addEventListener('click', ()=>{ if (confirm('New canvas?')) newCanvas(); });
document.getElementById('saveDraftBtn').addEventListener('click', ()=>{
    localStorage.setItem('procreate_draft', JSON.stringify(layers.map(l=>l.canvas.toDataURL())));
    alert('Draft saved.');
});
document.getElementById('loadDraftBtn').addEventListener('click', ()=>{
    const draft = localStorage.getItem('procreate_draft');
    if (!draft) { alert('No draft'); return; }
    const dataURLs = JSON.parse(draft);
    layers = [];
    dataURLs.forEach((d, i)=>{
        const c = createLayerCanvas(mainCanvas.width, mainCanvas.height, false);
        const img = new Image();
        img.onload = ()=>{ c.getContext('2d').drawImage(img,0,0); if (i===dataURLs.length-1) { compositeLayers(); renderLayerList(); } };
        img.src = d;
        layers.push({ canvas: c, name: `Layer ${i+1}`, visible: true });
    });
    activeLayerIndex=0; saveSnapshot(); renderLayerList(); alert('Draft loaded.');
});

// Responsive panels
function toggleLeft() { leftPanel.classList.toggle('open'); }
function toggleRight() { rightPanel.classList.toggle('open'); }
leftToggle.addEventListener('click', toggleLeft);
rightToggle.addEventListener('click', toggleRight);
function checkMobile() {
    const m = window.innerWidth <= 900;
    leftToggle.style.display = m ? 'block' : 'none';
    rightToggle.style.display = m ? 'block' : 'none';
    if (!m) { leftPanel.classList.remove('open'); rightPanel.classList.remove('open'); }
}
window.addEventListener('resize', checkMobile);
checkMobile();

// Init
resizeCanvas();
newCanvas();
</script>
