<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title data-i18n="app_name">Procreate+ Studio</title>
    <style>
        :root {
            --bg: #121212;
            --surface: #1e1e1e;
            --surface2: #2a2a2e;
            --border: #3a3a3c;
            --text: #e0e0e0;
            --text-secondary: #b0b0b0;
            --accent: #ff6b6b;
            --accent2: #4ecdc4;
            --radius: 16px;
            --transition: 0.2s ease;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
        }
        #app {
            width: 100vw;
            height: 100vh;
            max-width: 1400px;
            max-height: 900px;
            display: flex;
            flex-direction: column;
            background: var(--bg);
            border-radius: 0;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }
        /* Top bar */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 16px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 8px;
        }
        .topbar-left, .topbar-right {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .app-title {
            font-weight: 700;
            font-size: 20px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-right: 12px;
        }
        button, .btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 14px;
            border-radius: 24px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all var(--transition);
            white-space: nowrap;
        }
        button:hover, .btn:hover {
            background: #38383d;
        }
        button.accent {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
            font-weight: 600;
        }
        button.active {
            background: var(--accent2);
            border-color: var(--accent2);
            color: #000;
        }
        select {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 12px;
            border-radius: 24px;
            font-size: 13px;
            cursor: pointer;
            outline: none;
        }
        /* Main workspace */
        .workspace {
            flex: 1;
            display: flex;
            overflow: hidden;
            position: relative;
        }
        /* Panels */
        .panel {
            background: var(--surface);
            border-right: 1px solid var(--border);
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
            z-index: 5;
        }
        .left-panel {
            width: 220px;
        }
        .right-panel {
            width: 220px;
            border-right: none;
            border-left: 1px solid var(--border);
        }
        .panel-section {
            background: var(--surface2);
            border-radius: var(--radius);
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .panel-title {
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-secondary);
        }
        .tool-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        .tool-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 8px 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            cursor: pointer;
            transition: all var(--transition);
            color: var(--text-secondary);
        }
        .tool-item.active {
            background: var(--accent2);
            border-color: var(--accent2);
            color: #000;
            transform: scale(1.02);
        }
        .tool-icon {
            font-size: 22px;
        }
        input[type="color"] {
            width: 36px;
            height: 36px;
            border: 2px solid var(--border);
            border-radius: 50%;
            background: transparent;
            cursor: pointer;
            padding: 2px;
        }
        input[type="range"] {
            width: 100%;
            accent-color: var(--accent);
        }
        .slider-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .slider-row label {
            font-size: 12px;
            color: var(--text-secondary);
            min-width: 45px;
        }
        .slider-row span {
            font-size: 12px;
            color: var(--text);
            min-width: 28px;
            text-align: center;
        }
        /* Canvas area */
        .canvas-container {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #2c2c2e;
            overflow: hidden;
        }
        canvas#mainCanvas {
            background: white;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            max-width: 100%;
            max-height: 100%;
            touch-action: none;
        }
        canvas#previewCanvas {
            position: absolute;
            pointer-events: none;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            touch-action: none;
        }
        /* Layers panel */
        .layer-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-height: 250px;
            overflow-y: auto;
        }
        .layer-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--surface2);
            padding: 8px 10px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            border: 1px solid transparent;
        }
        .layer-item.active-layer {
            border-color: var(--accent);
            background: #2e2e35;
        }
        .layer-actions {
            display: flex;
            gap: 4px;
            margin-top: 8px;
            flex-wrap: wrap;
        }
        /* Responsive toggles */
        .panel-toggle {
            display: none;
            position: absolute;
            top: 60px;
            z-index: 10;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 0 12px 12px 0;
            padding: 10px;
            cursor: pointer;
            font-size: 20px;
        }
        .left-toggle {
            left: 0;
        }
        .right-toggle {
            right: 0;
            border-radius: 12px 0 0 12px;
        }
        @media (max-width: 900px) {
            .left-panel, .right-panel {
                position: absolute;
                top: 0;
                bottom: 0;
                width: 240px;
                transition: transform 0.3s ease;
                box-shadow: 0 0 20px rgba(0,0,0,0.5);
            }
            .left-panel {
                left: 0;
                transform: translateX(-100%);
            }
            .right-panel {
                right: 0;
                transform: translateX(100%);
            }
            .left-panel.open {
                transform: translateX(0);
            }
            .right-panel.open {
                transform: translateX(0);
            }
            .panel-toggle {
                display: block;
            }
        }
        @media (max-width: 500px) {
            .topbar button, .topbar .btn {
                padding: 6px 10px;
                font-size: 12px;
                gap: 4px;
            }
            .app-title {
                font-size: 16px;
            }
        }
        /* Modals */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal-content {
            background: var(--surface);
            padding: 24px;
            border-radius: 24px;
            min-width: 280px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .modal input {
            padding: 10px;
            border-radius: 12px;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
        }
    </style>
</head>
<body>
<div id="app">
    <!-- Top Bar -->
    <div class="topbar">
        <div class="topbar-left">
            <span class="app-title" data-i18n="app_name">Procreate+ Studio</span>
            <button id="newBtn" title="New canvas"><span>📄</span> <span data-i18n="new">New</span></button>
            <button id="saveDraftBtn" title="Save draft"><span>💾</span> <span data-i18n="save_draft">Save Draft</span></button>
            <button id="loadDraftBtn" title="Load draft"><span>📂</span> <span data-i18n="load_draft">Load Draft</span></button>
            <div class="dropdown" style="position:relative;">
                <button id="downloadBtn"><span>⬇️</span> <span data-i18n="download">Download</span></button>
                <div id="downloadMenu" style="display:none; position:absolute; top:100%; left:0; background:var(--surface2); border-radius:12px; padding:8px; flex-direction:column; gap:4px; z-index:20;">
                    <button class="download-option" data-type="png">🖼️ PNG</button>
                    <button class="download-option" data-type="jpeg">🖼️ JPEG</button>
                    <button class="download-option" data-type="pdf">📄 PDF</button>
                    <button id="recordBtn"><span>🎥</span> <span data-i18n="record">Record MP4</span></button>
                </div>
            </div>
        </div>
        <div class="topbar-right">
            <select id="languageSelect">
                <option value="en">English</option>
                <option value="ar">العربية</option>
                <option value="fr">Français</option>
            </select>
            <button id="leftPanelToggle" class="panel-toggle left-toggle" style="display:none;">☰</button>
            <button id="rightPanelToggle" class="panel-toggle right-toggle" style="display:none;">☰</button>
        </div>
    </div>

    <!-- Workspace -->
    <div class="workspace">
        <!-- Left Panel Tools -->
        <div class="panel left-panel" id="leftPanel">
            <div class="panel-section">
                <div class="panel-title" data-i18n="tools">Tools</div>
                <div class="tool-grid" id="toolsGrid">
                    <div class="tool-item active" data-tool="brush"><span class="tool-icon">🖌️</span><span data-i18n="brush">Brush</span></div>
                    <div class="tool-item" data-tool="eraser"><span class="tool-icon">🧽</span><span data-i18n="eraser">Eraser</span></div>
                    <div class="tool-item" data-tool="line"><span class="tool-icon">📏</span><span data-i18n="line">Line</span></div>
                    <div class="tool-item" data-tool="rect"><span class="tool-icon">▭</span><span data-i18n="rect">Rect</span></div>
                    <div class="tool-item" data-tool="circle"><span class="tool-icon">⭕</span><span data-i18n="circle">Circle</span></div>
                    <div class="tool-item" data-tool="fill"><span class="tool-icon">🪣</span><span data-i18n="fill">Fill</span></div>
                    <div class="tool-item" data-tool="text"><span class="tool-icon">🔤</span><span data-i18n="text_tool">Text</span></div>
                    <div class="tool-item" data-tool="eyedropper"><span class="tool-icon">💧</span><span data-i18n="eyedropper">Pick</span></div>
                </div>
            </div>
            <div class="panel-section">
                <div class="panel-title" data-i18n="brush_settings">Brush Settings</div>
                <div class="slider-row">
                    <label data-i18n="size">Size</label>
                    <input type="range" id="brushSize" min="1" max="60" value="12">
                    <span id="sizeValue">12</span>
                </div>
                <div class="slider-row">
                    <label data-i18n="opacity">Opacity</label>
                    <input type="range" id="brushOpacity" min="0.1" max="1" step="0.1" value="1">
                    <span id="opacityValue">100%</span>
                </div>
                <div>
                    <label style="font-size:12px; color:var(--text-secondary);" data-i18n="color">Color</label>
                    <input type="color" id="colorPicker" value="#000000">
                </div>
            </div>
        </div>

        <!-- Canvas -->
        <div class="canvas-container" id="canvasContainer">
            <canvas id="mainCanvas"></canvas>
            <canvas id="previewCanvas"></canvas>
        </div>

        <!-- Right Panel Layers -->
        <div class="panel right-panel" id="rightPanel">
            <div class="panel-section">
                <div class="panel-title" data-i18n="layers">Layers</div>
                <div class="layer-list" id="layerList"></div>
                <div class="layer-actions">
                    <button id="addLayerBtn"><span>➕</span> <span data-i18n="add_layer">Add</span></button>
                    <button id="deleteLayerBtn"><span>🗑️</span> <span data-i18n="delete_layer">Del</span></button>
                    <button id="mergeDownBtn"><span>⬇️</span> <span data-i18n="merge_down">Merge</span></button>
                    <button id="duplicateLayerBtn"><span>📋</span> <span data-i18n="duplicate">Dup</span></button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Text modal -->
<div class="modal" id="textModal">
    <div class="modal-content">
        <h3 data-i18n="enter_text">Enter Text</h3>
        <input type="text" id="textInput" placeholder="Your text here" maxlength="100">
        <div style="display:flex; gap:8px;">
            <button id="textConfirm" class="accent" data-i18n="ok">OK</button>
            <button id="textCancel" data-i18n="cancel">Cancel</button>
        </div>
    </div>
</div>

<script>
(function() {
    // ---------- i18n ----------
    const translations = {
        en: {
            app_name: "Procreate+ Studio",
            new: "New",
            save_draft: "Save Draft",
            load_draft: "Load Draft",
            download: "Download",
            record: "Record MP4",
            tools: "Tools",
            brush: "Brush",
            eraser: "Eraser",
            line: "Line",
            rect: "Rect",
            circle: "Circle",
            fill: "Fill",
            text_tool: "Text",
            eyedropper: "Pick",
            brush_settings: "Brush Settings",
            size: "Size",
            opacity: "Opacity",
            color: "Color",
            layers: "Layers",
            add_layer: "Add",
            delete_layer: "Del",
            merge_down: "Merge",
            duplicate: "Dup",
            enter_text: "Enter Text",
            ok: "OK",
            cancel: "Cancel",
            draft_saved: "Draft saved.",
            draft_loaded: "Draft loaded.",
            no_draft: "No saved draft.",
        },
        ar: {
            app_name: "استوديو بروكرييت+",
            new: "جديد",
            save_draft: "حفظ المسودة",
            load_draft: "تحميل مسودة",
            download: "تنزيل",
            record: "تسجيل فيديو",
            tools: "الأدوات",
            brush: "فرشاة",
            eraser: "ممحاة",
            line: "خط",
            rect: "مستطيل",
            circle: "دائرة",
            fill: "تعبئة",
            text_tool: "نص",
            eyedropper: "قطارة",
            brush_settings: "إعدادات الفرشاة",
            size: "الحجم",
            opacity: "الشفافية",
            color: "اللون",
            layers: "الطبقات",
            add_layer: "إضافة",
            delete_layer: "حذف",
            merge_down: "دمج",
            duplicate: "نسخ",
            enter_text: "أدخل النص",
            ok: "موافق",
            cancel: "إلغاء",
            draft_saved: "تم حفظ المسودة.",
            draft_loaded: "تم تحميل المسودة.",
            no_draft: "لا توجد مسودة محفوظة.",
        },
        fr: {
            app_name: "Procreate+ Studio",
            new: "Nouveau",
            save_draft: "Sauvegarder brouillon",
            load_draft: "Charger brouillon",
            download: "Télécharger",
            record: "Enregistrer MP4",
            tools: "Outils",
            brush: "Pinceau",
            eraser: "Gomme",
            line: "Ligne",
            rect: "Rectangle",
            circle: "Cercle",
            fill: "Remplir",
            text_tool: "Texte",
            eyedropper: "Pipette",
            brush_settings: "Paramètres du pinceau",
            size: "Taille",
            opacity: "Opacité",
            color: "Couleur",
            layers: "Calques",
            add_layer: "Ajouter",
            delete_layer: "Suppr",
            merge_down: "Fusionner",
            duplicate: "Dupliquer",
            enter_text: "Saisir le texte",
            ok: "OK",
            cancel: "Annuler",
            draft_saved: "Brouillon sauvegardé.",
            draft_loaded: "Brouillon chargé.",
            no_draft: "Aucun brouillon.",
        }
    };
    let currentLang = 'en';
    function t(key) { return translations[currentLang]?.[key] || key; }
    function applyLanguage(lang) {
        currentLang = lang;
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
                el.placeholder = t(key);
            } else {
                el.textContent = t(key);
            }
        });
        document.title = t('app_name');
    }
    document.getElementById('languageSelect').addEventListener('change', (e) => {
        applyLanguage(e.target.value);
    });
    applyLanguage('en');

    // ---------- DOM refs ----------
    const mainCanvas = document.getElementById('mainCanvas');
    const ctx = mainCanvas.getContext('2d');
    const previewCanvas = document.getElementById('previewCanvas');
    const pctx = previewCanvas.getContext('2d');
    const container = document.getElementById('canvasContainer');

    // Panels
    const leftPanel = document.getElementById('leftPanel');
    const rightPanel = document.getElementById('rightPanel');
    const leftToggle = document.getElementById('leftPanelToggle');
    const rightToggle = document.getElementById('rightPanelToggle');

    // Tools
    const toolItems = document.querySelectorAll('.tool-item');
    let currentTool = 'brush';

    // Settings
    const brushSizeInput = document.getElementById('brushSize');
    const brushOpacityInput = document.getElementById('brushOpacity');
    const colorPicker = document.getElementById('colorPicker');
    const sizeValue = document.getElementById('sizeValue');
    const opacityValue = document.getElementById('opacityValue');
    let brushSize = 12;
    let brushOpacity = 1;
    let currentColor = '#000000';

    // Layers
    let layers = [];
    let activeLayerIndex = 0;
    const layerListDiv = document.getElementById('layerList');

    // Undo/Redo
    let undoStack = [];
    let redoStack = [];
    const MAX_UNDO = 40;

    // Drawing state
    let isDrawing = false;
    let startX = 0, startY = 0;
    let lastX = 0, lastY = 0;

    // Preview shapes
    let shapePreview = null; // {type, x0,y0,x1,y1}

    // Recording
    let mediaRecorder = null;
    let recordedChunks = [];
    let isRecording = false;

    // ---------- Canvas sizing ----------
    function resizeCanvas() {
        const w = container.clientWidth - 20;
        const h = container.clientHeight - 20;
        const size = Math.min(w, h, 1000);
        mainCanvas.width = size;
        mainCanvas.height = size;
        previewCanvas.width = size;
        previewCanvas.height = size;
        // Recenter preview canvas (positioned absolute via CSS)
        previewCanvas.style.width = size + 'px';
        previewCanvas.style.height = size + 'px';
        // Reinitialize layers if needed
        if (layers.length === 0) {
            newCanvas();
        } else {
            // Resize all layer canvases (might lose content); safer to reload draft or keep size.
            // For simplicity, we'll keep current size; layers might mismatch but we'll recreate.
            layers.forEach(layer => {
                layer.canvas.width = size;
                layer.canvas.height = size;
            });
            compositeLayers();
        }
    }
    window.addEventListener('resize', resizeCanvas);

    // ---------- Layer management ----------
    function createLayerCanvas(w, h, fillWhite = true) {
        const c = document.createElement('canvas');
        c.width = w;
        c.height = h;
        const ctx = c.getContext('2d');
        if (fillWhite) {
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, w, h);
        }
        return c;
    }

    function newCanvas() {
        const w = mainCanvas.width;
        const h = mainCanvas.height;
        layers = [{
            canvas: createLayerCanvas(w, h, true),
            name: 'Layer 1',
            visible: true
        }];
        activeLayerIndex = 0;
        undoStack = [];
        redoStack = [];
        saveSnapshot();
        renderLayerList();
        compositeLayers();
    }

    function saveSnapshot() {
        const snapshot = layers.map(l => l.canvas.toDataURL());
        undoStack.push(snapshot);
        if (undoStack.length > MAX_UNDO) undoStack.shift();
        redoStack = [];
    }

    function restoreSnapshot(snapshot) {
        layers = snapshot.map((dataURL, i) => ({
            canvas: createLayerCanvas(mainCanvas.width, mainCanvas.height, false),
            name: layers[i]?.name || `Layer ${i+1}`,
            visible: true
        }));
        let loaded = 0;
        layers.forEach((layer, idx) => {
            const img = new Image();
            img.onload = () => {
                layer.canvas.getContext('2d').drawImage(img, 0, 0);
                loaded++;
                if (loaded === layers.length) {
                    compositeLayers();
                    renderLayerList();
                }
            };
            img.src = snapshot[idx];
        });
        if (activeLayerIndex >= layers.length) activeLayerIndex = layers.length - 1;
    }

    function undo() {
        if (undoStack.length <= 1) return;
        redoStack.push(undoStack.pop());
        restoreSnapshot(undoStack[undoStack.length - 1]);
    }

    function redo() {
        if (redoStack.length === 0) return;
        const snapshot = redoStack.pop();
        undoStack.push(snapshot);
        restoreSnapshot(snapshot);
    }

    function compositeLayers() {
        ctx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
        layers.forEach(layer => {
            if (layer.visible) {
                ctx.drawImage(layer.canvas, 0, 0);
            }
        });
    }

    function renderLayerList() {
        layerListDiv.innerHTML = '';
        layers.forEach((layer, i) => {
            const div = document.createElement('div');
            div.className = 'layer-item' + (i === activeLayerIndex ? ' active-layer' : '');
            div.innerHTML = `<span>${layer.name}</span>`;
            div.addEventListener('click', () => {
                activeLayerIndex = i;
                renderLayerList();
            });
            layerListDiv.appendChild(div);
        });
    }

    function getActiveLayerCanvas() {
        return layers[activeLayerIndex]?.canvas;
    }

    // ---------- Tools & Drawing ----------
    function setActiveTool(tool) {
        currentTool = tool;
        toolItems.forEach(item => item.classList.remove('active'));
        document.querySelector(`.tool-item[data-tool="${tool}"]`).classList.add('active');
        shapePreview = null;
        clearPreview();
    }

    toolItems.forEach(item => {
        item.addEventListener('click', () => {
            setActiveTool(item.dataset.tool);
        });
    });

    function getPos(e) {
        const rect = mainCanvas.getBoundingClientRect();
        const scaleX = mainCanvas.width / rect.width;
        const scaleY = mainCanvas.height / rect.height;
        let clientX, clientY;
        if (e.touches) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }
        return {
            x: (clientX - rect.left) * scaleX,
            y: (clientY - rect.top) * scaleY
        };
    }

    function clearPreview() {
        pctx.clearRect(0, 0, previewCanvas.width, previewCanvas.height);
    }

    function drawShapePreview() {
        if (!shapePreview || !isDrawing) return;
        clearPreview();
        const { type, x0, y0, x1, y1 } = shapePreview;
        pctx.strokeStyle = currentColor;
        pctx.lineWidth = brushSize;
        pctx.globalAlpha = brushOpacity;
        pctx.setLineDash([6, 4]);
        if (type === 'line') {
            pctx.beginPath();
            pctx.moveTo(x0, y0);
            pctx.lineTo(x1, y1);
            pctx.stroke();
        } else if (type === 'rect') {
            pctx.strokeRect(x0, y0, x1 - x0, y1 - y0);
        } else if (type === 'circle') {
            const rx = Math.abs(x1 - x0) / 2;
            const ry = Math.abs(y1 - y0) / 2;
            const cx = (x0 + x1) / 2;
            const cy = (y0 + y1) / 2;
            pctx.beginPath();
            pctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
            pctx.stroke();
        }
        pctx.setLineDash([]);
        pctx.globalAlpha = 1;
    }

    function startDraw(e) {
        e.preventDefault();
        const pos = getPos(e);
        startX = pos.x; startY = pos.y;
        lastX = pos.x; lastY = pos.y;
        isDrawing = true;
        saveSnapshot(); // save state before new stroke

        if (currentTool === 'brush' || currentTool === 'eraser') {
            const layerCtx = getActiveLayerCanvas().getContext('2d');
            layerCtx.beginPath();
            layerCtx.moveTo(lastX, lastY);
        } else if (['line','rect','circle'].includes(currentTool)) {
            shapePreview = { type: currentTool, x0: startX, y0: startY, x1: startX, y1: startY };
        } else if (currentTool === 'fill') {
            floodFill(Math.floor(startX), Math.floor(startY));
            isDrawing = false;
            compositeLayers();
        } else if (currentTool === 'text') {
            isDrawing = false;
            openTextModal(startX, startY);
        } else if (currentTool === 'eyedropper') {
            pickColor(Math.floor(startX), Math.floor(startY));
            isDrawing = false;
        }
    }

    function draw(e) {
        if (!isDrawing) return;
        e.preventDefault();
        const pos = getPos(e);
        const x = pos.x, y = pos.y;

        if (currentTool === 'brush' || currentTool === 'eraser') {
            const layerCtx = getActiveLayerCanvas().getContext('2d');
            layerCtx.lineWidth = brushSize;
            layerCtx.lineCap = 'round';
            layerCtx.lineJoin = 'round';
            layerCtx.globalAlpha = brushOpacity;
            if (currentTool === 'eraser') {
                layerCtx.globalCompositeOperation = 'destination-out';
            } else {
                layerCtx.globalCompositeOperation = 'source-over';
                layerCtx.strokeStyle = currentColor;
            }
            layerCtx.beginPath();
            layerCtx.moveTo(lastX, lastY);
            layerCtx.lineTo(x, y);
            layerCtx.stroke();
            lastX = x; lastY = y;
            compositeLayers();
        } else if (['line','rect','circle'].includes(currentTool)) {
            shapePreview.x1 = x; shapePreview.y1 = y;
            drawShapePreview();
        }
    }

    function endDraw(e) {
        if (!isDrawing) return;
        isDrawing = false;
        const layerCtx = getActiveLayerCanvas().getContext('2d');

        if (currentTool === 'brush' || currentTool === 'eraser') {
            layerCtx.closePath();
            layerCtx.globalCompositeOperation = 'source-over';
            layerCtx.globalAlpha = 1;
            compositeLayers();
        } else if (shapePreview) {
            clearPreview();
            const { type, x0, y0, x1, y1 } = shapePreview;
            layerCtx.globalAlpha = brushOpacity;
            layerCtx.strokeStyle = currentColor;
            layerCtx.lineWidth = brushSize;
            layerCtx.setLineDash([]);
            if (type === 'line') {
                layerCtx.beginPath();
                layerCtx.moveTo(x0, y0);
                layerCtx.lineTo(x1, y1);
                layerCtx.stroke();
            } else if (type === 'rect') {
                layerCtx.strokeRect(x0, y0, x1 - x0, y1 - y0);
            } else if (type === 'circle') {
                const rx = Math.abs(x1 - x0) / 2;
                const ry = Math.abs(y1 - y0) / 2;
                const cx = (x0 + x1) / 2;
                const cy = (y0 + y1) / 2;
                layerCtx.beginPath();
                layerCtx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
                layerCtx.stroke();
            }
            layerCtx.globalAlpha = 1;
            shapePreview = null;
            compositeLayers();
        }
    }

    // Flood fill (bucket)
    function floodFill(startX, startY) {
        const layerCanvas = getActiveLayerCanvas();
        const layerCtx = layerCanvas.getContext('2d');
        const imageData = layerCtx.getImageData(0, 0, layerCanvas.width, layerCanvas.height);
        const data = imageData.data;
        const w = layerCanvas.width;
        const h = layerCanvas.height;
        const targetIdx = (startY * w + startX) * 4;
        const targetR = data[targetIdx];
        const targetG = data[targetIdx+1];
        const targetB = data[targetIdx+2];
        const targetA = data[targetIdx+3];
        // Parse fill color
        const fillR = parseInt(currentColor.slice(1,3), 16);
        const fillG = parseInt(currentColor.slice(3,5), 16);
        const fillB = parseInt(currentColor.slice(5,7), 16);
        const fillA = Math.round(brushOpacity * 255);
        if (targetR === fillR && targetG === fillG && targetB === fillB && targetA === fillA) return;
        const stack = [[startX, startY]];
        const visited = new Uint8Array(w * h);
        const idx = (y, x) => (y * w + x) * 4;
        while (stack.length) {
            const [x, y] = stack.pop();
            const pixelIdx = y * w + x;
            if (x < 0 || x >= w || y < 0 || y >= h) continue;
            if (visited[pixelIdx]) continue;
            const p = idx(y, x);
            if (data[p] !== targetR || data[p+1] !== targetG || data[p+2] !== targetB || data[p+3] !== targetA) continue;
            visited[pixelIdx] = 1;
            data[p] = fillR;
            data[p+1] = fillG;
            data[p+2] = fillB;
            data[p+3] = fillA;
            stack.push([x+1, y], [x-1, y], [x, y+1], [x, y-1]);
        }
        layerCtx.putImageData(imageData, 0, 0);
    }

    // Eyedropper
    function pickColor(x, y) {
        const compositeData = ctx.getImageData(x, y, 1, 1).data;
        const hex = '#' + ((1 << 24) + (compositeData[0] << 16) + (compositeData[1] << 8) + compositeData[2]).toString(16).slice(1);
        colorPicker.value = hex;
        currentColor = hex;
    }

    // Text tool
    const textModal = document.getElementById('textModal');
    const textInput = document.getElementById('textInput');
    let textPlaceX = 0, textPlaceY = 0;
    function openTextModal(x, y) {
        textPlaceX = x; textPlaceY = y;
        textModal.style.display = 'flex';
        textInput.value = '';
        textInput.focus();
    }
    document.getElementById('textConfirm').addEventListener('click', () => {
        const text = textInput.value.trim();
        if (text) {
            const layerCtx = getActiveLayerCanvas().getContext('2d');
            layerCtx.font = `${brushSize*2}px "Segoe UI", Roboto, sans-serif`;
            layerCtx.fillStyle = currentColor;
            layerCtx.globalAlpha = brushOpacity;
            layerCtx.fillText(text, textPlaceX, textPlaceY);
            layerCtx.globalAlpha = 1;
            saveSnapshot();
            compositeLayers();
        }
        textModal.style.display = 'none';
    });
    document.getElementById('textCancel').addEventListener('click', () => {
        textModal.style.display = 'none';
    });

    // ---------- Event Listeners ----------
    mainCanvas.addEventListener('mousedown', startDraw);
    mainCanvas.addEventListener('mousemove', draw);
    mainCanvas.addEventListener('mouseup', endDraw);
    mainCanvas.addEventListener('mouseleave', endDraw);
    mainCanvas.addEventListener('touchstart', startDraw, { passive: false });
    mainCanvas.addEventListener('touchmove', draw, { passive: false });
    mainCanvas.addEventListener('touchend', endDraw);
    mainCanvas.addEventListener('touchcancel', endDraw);

    // Settings
    brushSizeInput.addEventListener('input', () => {
        brushSize = parseInt(brushSizeInput.value);
        sizeValue.textContent = brushSize;
    });
    brushOpacityInput.addEventListener('input', () => {
        brushOpacity = parseFloat(brushOpacityInput.value);
        opacityValue.textContent = Math.round(brushOpacity * 100) + '%';
    });
    colorPicker.addEventListener('input', () => {
        currentColor = colorPicker.value;
    });

    // Layer buttons
    document.getElementById('addLayerBtn').addEventListener('click', () => {
        saveSnapshot();
        const newCanvas = createLayerCanvas(mainCanvas.width, mainCanvas.height, false);
        layers.push({ canvas: newCanvas, name: `Layer ${layers.length+1}`, visible: true });
        activeLayerIndex = layers.length - 1;
        renderLayerList();
        compositeLayers();
    });
    document.getElementById('deleteLayerBtn').addEventListener('click', () => {
        if (layers.length <= 1) return;
        saveSnapshot();
        layers.splice(activeLayerIndex, 1);
        if (activeLayerIndex >= layers.length) activeLayerIndex = layers.length - 1;
        renderLayerList();
        compositeLayers();
    });
    document.getElementById('mergeDownBtn').addEventListener('click', () => {
        if (activeLayerIndex === 0 || layers.length < 2) return;
        saveSnapshot();
        const upper = layers[activeLayerIndex].canvas;
        const lower = layers[activeLayerIndex - 1].canvas;
        lower.getContext('2d').drawImage(upper, 0, 0);
        layers.splice(activeLayerIndex, 1);
        activeLayerIndex--;
        renderLayerList();
        compositeLayers();
    });
    document.getElementById('duplicateLayerBtn').addEventListener('click', () => {
        saveSnapshot();
        const dupCanvas = createLayerCanvas(mainCanvas.width, mainCanvas.height, false);
        dupCanvas.getContext('2d').drawImage(layers[activeLayerIndex].canvas, 0, 0);
        layers.splice(activeLayerIndex+1, 0, { canvas: dupCanvas, name: `${layers[activeLayerIndex].name} copy`, visible: true });
        activeLayerIndex++;
        renderLayerList();
        compositeLayers();
    });

    // Undo/Redo keyboard
    document.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undo(); }
        else if (e.ctrlKey && e.key === 'y') { e.preventDefault(); redo(); }
    });

    // New canvas
    document.getElementById('newBtn').addEventListener('click', () => {
        if (confirm(t('new') + '?')) {
            newCanvas();
        }
    });

    // Save/Load Draft
    document.getElementById('saveDraftBtn').addEventListener('click', () => {
        const draft = layers.map(l => l.canvas.toDataURL());
        localStorage.setItem('procreate_draft', JSON.stringify(draft));
        alert(t('draft_saved'));
    });
    document.getElementById('loadDraftBtn').addEventListener('click', () => {
        const draft = localStorage.getItem('procreate_draft');
        if (!draft) { alert(t('no_draft')); return; }
        const dataURLs = JSON.parse(draft);
        layers = [];
        dataURLs.forEach((dataURL, i) => {
            const c = createLayerCanvas(mainCanvas.width, mainCanvas.height, false);
            const img = new Image();
            img.onload = () => {
                c.getContext('2d').drawImage(img, 0, 0);
                if (i === dataURLs.length - 1) {
                    compositeLayers();
                    renderLayerList();
                }
            };
            img.src = dataURL;
            layers.push({ canvas: c, name: `Layer ${i+1}`, visible: true });
        });
        activeLayerIndex = 0;
        saveSnapshot();
        renderLayerList();
        alert(t('draft_loaded'));
    });

    // Download menu
    const downloadMenu = document.getElementById('downloadMenu');
    document.getElementById('downloadBtn').addEventListener('click', (e) => {
        e.stopPropagation();
        downloadMenu.style.display = downloadMenu.style.display === 'flex' ? 'none' : 'flex';
    });
    document.addEventListener('click', () => {
        downloadMenu.style.display = 'none';
    });
    downloadMenu.addEventListener('click', (e) => e.stopPropagation());

    document.querySelectorAll('.download-option').forEach(btn => {
        btn.addEventListener('click', () => {
            const type = btn.dataset.type;
            if (type === 'png') {
                const link = document.createElement('a');
                link.download = 'drawing.png';
                link.href = mainCanvas.toDataURL('image/png');
                link.click();
            } else if (type === 'jpeg') {
                const link = document.createElement('a');
                link.download = 'drawing.jpg';
                link.href = mainCanvas.toDataURL('image/jpeg', 0.9);
                link.click();
            } else if (type === 'pdf') {
                generatePDF();
            }
            downloadMenu.style.display = 'none';
        });
    });

    function generatePDF() {
        // Dynamically load jsPDF if not present
        if (typeof window.jspdf === 'undefined') {
            const script = document.createElement('script');
            script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
            script.onload = () => {
                exportPDF();
            };
            document.head.appendChild(script);
        } else {
            exportPDF();
        }
    }
    function exportPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('landscape', 'px', [mainCanvas.width, mainCanvas.height]);
        doc.addImage(mainCanvas.toDataURL('image/png'), 'PNG', 0, 0, mainCanvas.width, mainCanvas.height);
        doc.save('drawing.pdf');
    }

    // Recording
    document.getElementById('recordBtn').addEventListener('click', () => {
        if (isRecording) {
            mediaRecorder.stop();
            isRecording = false;
            document.getElementById('recordBtn').innerHTML = '🎥 Record MP4';
        } else {
            const stream = mainCanvas.captureStream(30);
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
            recordedChunks = [];
            mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'drawing.webm';
                a.click();
                URL.revokeObjectURL(url);
            };
            mediaRecorder.start();
            isRecording = true;
            document.getElementById('recordBtn').innerHTML = '⏹️ Stop Recording';
        }
        downloadMenu.style.display = 'none';
    });

    // Responsive panel toggles
    function toggleLeftPanel() {
        leftPanel.classList.toggle('open');
    }
    function toggleRightPanel() {
        rightPanel.classList.toggle('open');
    }
    leftToggle.addEventListener('click', toggleLeftPanel);
    rightToggle.addEventListener('click', toggleRightPanel);

    // Show toggles on mobile
    function checkMobile() {
        const mobile = window.innerWidth <= 900;
        leftToggle.style.display = mobile ? 'block' : 'none';
        rightToggle.style.display = mobile ? 'block' : 'none';
        if (!mobile) {
            leftPanel.classList.remove('open');
            rightPanel.classList.remove('open');
        }
    }
    window.addEventListener('resize', checkMobile);
    checkMobile();

    // Initialize
    resizeCanvas();
    newCanvas();
})();
</script>
</body>
</html>
