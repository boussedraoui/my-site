<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title data-i18n="app_name">Procreate+ Studio 360°</title>
    <style>
        :root {
            --bg: #121212;
            --surface: #1e1e1e;
            --surface2: #2a2a2e;
            --border: #3a3a3c;
            --text: #e0e0e0;
            --text-secondary: #b0b0b0;
            --accent: #ff6b6b;
            --accent2: #4ecdc4;
            --radius: 16px;
            --transition: 0.2s ease;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
        }
        #app {
            width: 100vw; height: 100vh;
            max-width: 1400px; max-height: 900px;
            display: flex; flex-direction: column;
            background: var(--bg);
            border-radius: 0;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }
        .topbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 16px; background: var(--surface);
            border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 8px;
        }
        .topbar-left, .topbar-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .app-title {
            font-weight: 700; font-size: 20px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-right: 12px;
        }
        button, .btn {
            background: var(--surface2); border: 1px solid var(--border);
            color: var(--text); padding: 8px 14px; border-radius: 24px;
            font-size: 13px; font-weight: 500; cursor: pointer;
            display: flex; align-items: center; gap: 6px;
            transition: all var(--transition); white-space: nowrap;
        }
        button:hover, .btn:hover { background: #38383d; }
        button.accent { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
        button.active { background: var(--accent2); border-color: var(--accent2); color: #000; }
        select {
            background: var(--surface2); border: 1px solid var(--border);
            color: var(--text); padding: 8px 12px; border-radius: 24px;
            font-size: 13px; cursor: pointer; outline: none;
        }
        .workspace { flex: 1; display: flex; overflow: hidden; position: relative; }
        .panel {
            background: var(--surface); border-right: 1px solid var(--border);
            padding: 12px; display: flex; flex-direction: column; gap: 12px;
            overflow-y: auto; z-index: 5;
        }
        .left-panel { width: 220px; }
        .right-panel { width: 220px; border-right: none; border-left: 1px solid var(--border); }
        .panel-section {
            background: var(--surface2); border-radius: var(--radius);
            padding: 12px; display: flex; flex-direction: column; gap: 8px;
        }
        .panel-title {
            font-weight: 600; font-size: 12px; text-transform: uppercase;
            letter-spacing: 0.8px; color: var(--text-secondary);
        }
        .tool-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .tool-item {
            background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
            padding: 8px 4px; display: flex; flex-direction: column; align-items: center; gap: 4px;
            font-size: 11px; cursor: pointer; transition: all var(--transition); color: var(--text-secondary);
        }
        .tool-item.active { background: var(--accent2); border-color: var(--accent2); color: #000; transform: scale(1.02); }
        .tool-icon { font-size: 22px; }
        input[type="color"] {
            width: 36px; height: 36px; border: 2px solid var(--border); border-radius: 50%;
            background: transparent; cursor: pointer; padding: 2px;
        }
        input[type="range"] { width: 100%; accent-color: var(--accent); }
        .slider-row { display: flex; align-items: center; gap: 8px; }
        .slider-row label { font-size: 12px; color: var(--text-secondary); min-width: 45px; }
        .slider-row span { font-size: 12px; color: var(--text); min-width: 28px; text-align: center; }
        .canvas-container {
            flex: 1; position: relative; display: flex; align-items: center; justify-content: center;
            background: #2c2c2e; overflow: hidden;
        }
        canvas#mainCanvas {
            background: white; box-shadow: 0 0 30px rgba(0,0,0,0.5);
            max-width: 100%; max-height: 100%; touch-action: none;
        }
        canvas#previewCanvas {
            position: absolute; pointer-events: none;
            top: 50%; left: 50%; transform: translate(-50%, -50%); touch-action: none;
        }
        #threeContainer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none;
        }
        .layer-list { display: flex; flex-direction: column; gap: 4px; max-height: 250px; overflow-y: auto; }
        .layer-item {
            display: flex; align-items: center; justify-content: space-between;
            background: var(--surface2); padding: 8px 10px; border-radius: 10px;
            cursor: pointer; font-size: 13px; border: 1px solid transparent;
        }
        .layer-item.active-layer { border-color: var(--accent); background: #2e2e35; }
        .layer-actions { display: flex; gap: 4px; margin-top: 8px; flex-wrap: wrap; }
        .panel-toggle {
            display: none; position: absolute; top: 60px; z-index: 10;
            background: var(--surface2); border: 1px solid var(--border);
            border-radius: 0 12px 12px 0; padding: 10px; cursor: pointer; font-size: 20px;
        }
        .left-toggle { left: 0; }
        .right-toggle { right: 0; border-radius: 12px 0 0 12px; }
        @media (max-width: 900px) {
            .left-panel, .right-panel {
                position: absolute; top: 0; bottom: 0; width: 240px;
                transition: transform 0.3s ease; box-shadow: 0 0 20px rgba(0,0,0,0.5);
            }
            .left-panel { left: 0; transform: translateX(-100%); }
            .right-panel { right: 0; transform: translateX(100%); }
            .left-panel.open { transform: translateX(0); }
            .right-panel.open { transform: translateX(0); }
            .panel-toggle { display: block; }
        }
        @media (max-width: 500px) {
            .topbar button, .topbar .btn { padding: 6px 10px; font-size: 12px; gap: 4px; }
            .app-title { font-size: 16px; }
        }
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 100;
        }
        .modal-content {
            background: var(--surface); padding: 24px; border-radius: 24px;
            min-width: 280px; display: flex; flex-direction: column; gap: 16px;
        }
        .modal input {
            padding: 10px; border-radius: 12px; background: var(--surface2);
            border: 1px solid var(--border); color: var(--text);
        }
        #uploadInput { display: none; }

        /* Fullscreen overlay */
        .fullscreen-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%; background: black; z-index:200;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .fullscreen-overlay.active { display: flex; }
        .fullscreen-canvas-container {
            width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
        }

        /* Chat Panel */
        #chatPanel {
            position: absolute; top:0; right:0; width: 320px; height:100%;
            background: var(--surface); border-left: 1px solid var(--border);
            display: none; flex-direction: column; z-index:20; transition: width 0.3s;
        }
        #chatPanel.visible { display: flex; }
        #chatPanel.maximized { width: 100%; }
        .chat-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 12px; background: var(--surface2); border-bottom: 1px solid var(--border);
        }
        .chat-tabs { display: flex; gap: 4px; overflow-x: auto; padding: 4px; }
        .chat-tab {
            background: var(--surface2); border: 1px solid var(--border); padding: 6px 12px;
            border-radius: 16px; font-size: 12px; cursor: pointer; white-space: nowrap;
        }
        .chat-tab.active { background: var(--accent); color:#fff; }
        .chat-messages {
            flex:1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px;
        }
        .message {
            background: var(--surface2); border-radius: 12px; padding: 8px 12px; max-width: 80%;
            align-self: flex-start; position: relative;
        }
        .message.own { align-self: flex-end; background: var(--accent); color:#fff; }
        .message .username { font-weight: 600; font-size: 11px; margin-bottom: 2px; }
        .message .time { font-size: 10px; color: #888; }
        .message img, .message video { max-width: 100%; border-radius: 8px; margin-top: 4px; }
        .message a { color: var(--accent2); }
        .chat-input-area {
            display: flex; align-items: center; padding: 8px 12px; gap: 8px;
            border-top: 1px solid var(--border); background: var(--surface2);
        }
        .chat-input-area input[type="text"] {
            flex:1; padding: 10px; border-radius: 20px; background: var(--surface);
            border: 1px solid var(--border); color: var(--text); outline: none;
        }
        .chat-input-area button { padding: 8px; }
        .chat-file-btn { font-size: 18px; cursor: pointer; }
        #chatFileInput { display: none; }
        .voice-video-preview { position: fixed; bottom: 20px; left:20px; background: #000; border-radius:12px; padding:8px; display:none; z-index:300; }
        .blocked { opacity: 0.4; }
        .context-menu { position: absolute; background: var(--surface); border:1px solid var(--border); border-radius:8px; padding:4px; z-index:250; display:none; }
    </style>
</head>
<body>
<div id="app">
    <div class="topbar">
        <div class="topbar-left">
            <span class="app-title" data-i18n="app_name">Procreate+ Studio</span>
            <button id="newBtn"><span>📄</span> <span data-i18n="new">New</span></button>
            <button id="saveDraftBtn"><span>💾</span> <span data-i18n="save_draft">Save Draft</span></button>
            <button id="loadDraftBtn"><span>📂</span> <span data-i18n="load_draft">Load Draft</span></button>
            <button id="uploadBtn"><span>📁</span> <span data-i18n="upload">Upload</span></button>
            <input type="file" id="uploadInput" accept="image/*, .svg, .pdf">
            <button id="toggle3D" class="accent"><span>🌐</span> 360° / 3D</button>
            <button id="fullscreenBtn" title="Fullscreen drawing"><span>⛶</span></button>
            <button id="chatBtn" title="Toggle chat"><span>💬</span> Chat</button>
            <div class="dropdown" style="position:relative;">
                <button id="downloadBtn"><span>⬇️</span> <span data-i18n="download">Download</span></button>
                <div id="downloadMenu" style="display:none; position:absolute; top:100%; left:0; background:var(--surface2); border-radius:12px; padding:8px; flex-direction:column; gap:4px; z-index:20;">
                    <button class="download-option" data-type="png">🖼️ PNG</button>
                    <button class="download-option" data-type="jpeg">🖼️ JPEG</button>
                    <button class="download-option" data-type="webp">🖼️ WebP</button>
                    <button class="download-option" data-type="avif">🖼️ AVIF</button>
                    <button class="download-option" data-type="svg">🧩 SVG</button>
                    <button class="download-option" data-type="pdf">📄 PDF</button>
                    <button id="recordBtn"><span>🎥</span> <span data-i18n="record">Record MP4</span></button>
                </div>
            </div>
        </div>
        <div class="topbar-right">
            <select id="languageSelect"></select>
            <button id="leftPanelToggle" class="panel-toggle left-toggle" style="display:none;">☰</button>
            <button id="rightPanelToggle" class="panel-toggle right-toggle" style="display:none;">☰</button>
        </div>
    </div>

    <div class="workspace">
        <div class="panel left-panel" id="leftPanel">
            <div class="panel-section">
                <div class="panel-title" data-i18n="tools">Tools</div>
                <div class="tool-grid" id="toolsGrid">
                    <div class="tool-item active" data-tool="brush"><span class="tool-icon">🖌️</span><span data-i18n="brush">Brush</span></div>
                    <div class="tool-item" data-tool="eraser"><span class="tool-icon">🧽</span><span data-i18n="eraser">Eraser</span></div>
                    <div class="tool-item" data-tool="line"><span class="tool-icon">📏</span><span data-i18n="line">Line</span></div>
                    <div class="tool-item" data-tool="rect"><span class="tool-icon">▭</span><span data-i18n="rect">Rect</span></div>
                    <div class="tool-item" data-tool="circle"><span class="tool-icon">⭕</span><span data-i18n="circle">Circle</span></div>
                    <div class="tool-item" data-tool="fill"><span class="tool-icon">🪣</span><span data-i18n="fill">Fill</span></div>
                    <div class="tool-item" data-tool="text"><span class="tool-icon">🔤</span><span data-i18n="text_tool">Text</span></div>
                    <div class="tool-item" data-tool="eyedropper"><span class="tool-icon">💧</span><span data-i18n="eyedropper">Pick</span></div>
                </div>
            </div>
            <div class="panel-section">
                <div class="panel-title" data-i18n="brush_settings">Brush Settings</div>
                <div class="slider-row">
                    <label data-i18n="size">Size</label>
                    <input type="range" id="brushSize" min="1" max="60" value="12">
                    <span id="sizeValue">12</span>
                </div>
                <div class="slider-row">
                    <label data-i18n="opacity">Opacity</label>
                    <input type="range" id="brushOpacity" min="0.1" max="1" step="0.1" value="1">
                    <span id="opacityValue">100%</span>
                </div>
                <div>
                    <label style="font-size:12px; color:var(--text-secondary);" data-i18n="color">Color</label>
                    <input type="color" id="colorPicker" value="#000000">
                </div>
            </div>
        </div>

        <div class="canvas-container" id="canvasContainer">
            <canvas id="mainCanvas"></canvas>
            <canvas id="previewCanvas"></canvas>
            <div id="threeContainer"></div>
        </div>

        <div class="panel right-panel" id="rightPanel">
            <div class="panel-section">
                <div class="panel-title" data-i18n="layers">Layers</div>
                <div class="layer-list" id="layerList"></div>
                <div class="layer-actions">
                    <button id="addLayerBtn"><span>➕</span> <span data-i18n="add_layer">Add</span></button>
                    <button id="deleteLayerBtn"><span>🗑️</span> <span data-i18n="delete_layer">Del</span></button>
                    <button id="mergeDownBtn"><span>⬇️</span> <span data-i18n="merge_down">Merge</span></button>
                    <button id="duplicateLayerBtn"><span>📋</span> <span data-i18n="duplicate">Dup</span></button>
                </div>
            </div>
        </div>

        <!-- Chat Panel -->
        <div id="chatPanel">
            <div class="chat-header">
                <span style="font-weight:600;">Chat</span>
                <div style="display:flex; gap:4px;">
                    <button id="chatMaxBtn" title="Maximize">🗖</button>
                    <button id="chatCloseBtn">✕</button>
                </div>
            </div>
            <div class="chat-tabs" id="chatTabs">
                <div class="chat-tab active" data-room="general"># general</div>
            </div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="Type a message...">
                <input type="file" id="chatFileInput" multiple>
                <label for="chatFileInput" class="chat-file-btn">📎</label>
                <button id="voiceBtn" title="Start voice (demo)">🎤</button>
                <button id="videoBtn" title="Start video (demo)">📹</button>
                <button id="sendBtn">➤</button>
            </div>
            <div class="voice-video-preview" id="previewContainer">
                <video id="previewVideo" autoplay muted playsinline style="width:120px; border-radius:8px;"></video>
                <button id="closePreview">✕</button>
            </div>
        </div>
    </div>
</div>

<div class="modal" id="textModal">
    <div class="modal-content">
        <h3 data-i18n="enter_text">Enter Text</h3>
        <input type="text" id="textInput" placeholder="Your text here" maxlength="100">
        <div style="display:flex; gap:8px;">
            <button id="textConfirm" class="accent" data-i18n="ok">OK</button>
            <button id="textCancel" data-i18n="cancel">Cancel</button>
        </div>
    </div>
</div>

<!-- Fullscreen overlay -->
<div class="fullscreen-overlay" id="fullscreenOverlay">
    <div class="fullscreen-canvas-container" id="fullscreenCanvasContainer">
        <canvas id="fullscreenCanvas" style="background:white; box-shadow:0 0 30px rgba(0,0,0,0.5);"></canvas>
    </div>
    <button id="exitFullscreenBtn" style="position:absolute; top:10px; right:10px; background:var(--surface2); color:white; border:none; padding:8px 16px; border-radius:12px; cursor:pointer;">✕ Exit Fullscreen</button>
</div>

<!-- Three.js -->
<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
        }
    }
</script>

    chatMessages.innerHTML = '';

        const div = document.createElement('div');
        div.className = 'message' + (msg.from === username ? ' own' : '');

        if (msg.type === 'text') div.innerHTML += `<div>${msg.text}</div>`;
        else if (msg.type === 'file') {
            if (msg.fileType.startsWith('image/')) div.innerHTML += `<img src="${msg.data}" />`;
            else if (msg.fileType.startsWith('video/')) div.innerHTML += `<video src="${msg.data}" controls></video>`;
            else div.innerHTML += `<a href="${msg.data}" download="file">Download file</a>`;
        }
        div.innerHTML += `<div class="time">${new Date(msg.time).toLocaleTimeString()}</div>`;
        div.oncontextmenu = (e) => {
            e.preventDefault();
            blockUser(msg.from);
        };
        chatMessages.appendChild(div);
    });
    chatMessages.scrollTop = chatMessages.scrollHeight;
}

function resizeCanvas() {

    const h = container.clientHeight - 20;

    mainCanvas.width = size;
    mainCanvas.height = size;
    previewCanvas.width = size;

    if (layers.length === 0) {
        newCanvas();

        compositeLayers();
    }
    if (is3D) update3DTexture();

// ---------- Layer management ----------
function createLayerCanvas(w, h, fillWhite = true) {
    const c = document.createElement('canvas');
    c.width = w; c.height = h;
    const ctx = c.getContext('2d');
    if (fillWhite) { ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, w, h); }
    return c;
}

function newCanvas() {
    const w = mainCanvas.width, h = mainCanvas.height;
    layers = [{ canvas: createLayerCanvas(w, h, true), name: 'Layer 1', visible: true }];
    activeLayerIndex = 0;
    undoStack = []; redoStack = [];
    saveSnapshot();
    renderLayerList();
    compositeLayers();
}

function saveSnapshot() {
    const snapshot = layers.map(l => l.canvas.toDataURL());
    undoStack.push(snapshot);
    if (undoStack.length > MAX_UNDO) undoStack.shift();
    redoStack = [];
}

function restoreSnapshot(snapshot) {
    layers = snapshot.map((dataURL, i) => ({
        canvas: createLayerCanvas(mainCanvas.width, mainCanvas.height, false),
        name: layers[i]?.name || `Layer ${i+1}`,
        visible: true
    }));
    let loaded = 0;
    layers.forEach((layer, idx) => {
        const img = new Image();
        img.onload = () => {
            layer.canvas.getContext('2d').drawImage(img, 0, 0);
            loaded++;
            if (loaded === layers.length) { compositeLayers(); renderLayerList(); }
        };
        img.src = snapshot[idx];
    });
    if (activeLayerIndex >= layers.length) activeLayerIndex = layers.length - 1;
}

function undo() {
    if (undoStack.length <= 1) return;
    redoStack.push(undoStack.pop());
    restoreSnapshot(undoStack[undoStack.length - 1]);
}

function redo() {
    if (redoStack.length === 0) return;
    const snapshot = redoStack.pop();
    undoStack.push(snapshot);
    restoreSnapshot(snapshot);
}

function compositeLayers() {
    ctx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
    layers.forEach(layer => { if (layer.visible) ctx.drawImage(layer.canvas, 0, 0); });
    if (is3D && texture3D) texture3D.needsUpdate = true;
    if (isFullscreen) compositeLayersToFullscreen();
}

function renderLayerList() {
    layerListDiv.innerHTML = '';
    layers.forEach((layer, i) => {
        const div = document.createElement('div');
        div.className = 'layer-item' + (i === activeLayerIndex ? ' active-layer' : '');
        div.innerHTML = `<span>${layer.name}</span>`;
        div.addEventListener('click', () => { activeLayerIndex = i; renderLayerList(); });
        layerListDiv.appendChild(div);
    });
}

function getActiveLayerCanvas() { return layers[activeLayerIndex]?.canvas; }

// ---------- Tools & Drawing (2D) ----------
function setActiveTool(tool) {

    toolItems.forEach(item => item.classList.remove('active'));
    document.querySelector(`.tool-item[data-tool="${tool}"]`).classList.add('active');

function getPos(e, canvas = mainCanvas) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    let clientX, clientY;
    if (e.touches) { clientX = e.touches[0].clientX; clientY = e.touches[0].clientY; }
    else { clientX = e.clientX; clientY = e.clientY; }
    return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
}

function clearPreview() { pctx.clearRect(0, 0, previewCanvas.width, previewCanvas.height); }

function drawShapePreview() {
    if (!shapePreview || !isDrawing) return;
    clearPreview();
    const { type, x0, y0, x1, y1 } = shapePreview;
    pctx.strokeStyle = currentColor;
    pctx.lineWidth = brushSize;
    pctx.globalAlpha = brushOpacity;
    pctx.setLineDash([6, 4]);
    if (type === 'line') { pctx.beginPath(); pctx.moveTo(x0, y0); pctx.lineTo(x1, y1); pctx.stroke(); }
    else if (type === 'rect') { pctx.strokeRect(x0, y0, x1 - x0, y1 - y0); }
    else if (type === 'circle') {
        const rx = Math.abs(x1 - x0) / 2; const ry = Math.abs(y1 - y0) / 2;
        const cx = (x0 + x1) / 2; const cy = (y0 + y1) / 2;
        pctx.beginPath(); pctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2); pctx.stroke();
    }
    pctx.setLineDash([]);
    pctx.globalAlpha = 1;
}

// Core drawing functions that accept x,y directly
function startDrawAt(x, y) {
    isDrawing = true;
    saveSnapshot();
    startX = x; startY = y;
    lastX = x; lastY = y;
    if (currentTool === 'brush' || currentTool === 'eraser') {
        const lctx = getActiveLayerCanvas().getContext('2d');
        lctx.beginPath(); lctx.moveTo(lastX, lastY);
    } else if (['line','rect','circle'].includes(currentTool)) {
        shapePreview = { type: currentTool, x0: startX, y0: startY, x1: startX, y1: startY };
    } else if (currentTool === 'fill') {
        floodFill(Math.floor(startX), Math.floor(startY));
        isDrawing = false; compositeLayers();
    } else if (currentTool === 'text') {
        isDrawing = false; openTextModal(startX, startY);
    } else if (currentTool === 'eyedropper') {
        pickColor(Math.floor(startX), Math.floor(startY)); isDrawing = false;
    }
}

function drawAt(x, y) {
    if (!isDrawing) return;
    if (currentTool === 'brush' || currentTool === 'eraser') {
        const lctx = getActiveLayerCanvas().getContext('2d');
        lctx.lineWidth = brushSize;
        lctx.lineCap = 'round'; lctx.lineJoin = 'round';
        lctx.globalAlpha = brushOpacity;
        lctx.globalCompositeOperation = (currentTool === 'eraser') ? 'destination-out' : 'source-over';
        if (currentTool !== 'eraser') lctx.strokeStyle = currentColor;
        lctx.beginPath(); lctx.moveTo(lastX, lastY); lctx.lineTo(x, y); lctx.stroke();
        lastX = x; lastY = y;
        compositeLayers();
    } else if (['line','rect','circle'].includes(currentTool)) {
        shapePreview.x1 = x; shapePreview.y1 = y;
        drawShapePreview();
    }
}

function endDrawAt() {
    if (!isDrawing) return;
    isDrawing = false;
    if (currentTool === 'brush' || currentTool === 'eraser') {
        const lctx = getActiveLayerCanvas().getContext('2d');
        lctx.closePath();
        lctx.globalCompositeOperation = 'source-over'; lctx.globalAlpha = 1;
        compositeLayers();
    } else if (shapePreview) {
        clearPreview();
        const { type, x0, y0, x1, y1 } = shapePreview;
        const lctx = getActiveLayerCanvas().getContext('2d');
        lctx.globalAlpha = brushOpacity;
        lctx.strokeStyle = currentColor; lctx.lineWidth = brushSize;
        lctx.setLineDash([]);
        if (type === 'line') { lctx.beginPath(); lctx.moveTo(x0, y0); lctx.lineTo(x1, y1); lctx.stroke(); }
        else if (type === 'rect') lctx.strokeRect(x0, y0, x1 - x0, y1 - y0);
        else if (type === 'circle') {
            const rx = Math.abs(x1 - x0) / 2; const ry = Math.abs(y1 - y0) / 2;
            const cx = (x0 + x1) / 2; const cy = (y0 + y1) / 2;
            lctx.beginPath(); lctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2); lctx.stroke();
        }
        lctx.globalAlpha = 1;
        shapePreview = null;
        compositeLayers();
    }
}

// Original event-based drawing (for 2D normal mode)
function startDraw(e) {
    e.preventDefault();
    if (is3D && (currentTool === 'brush' || currentTool === 'eraser')) {
        const rect = renderer3D.domElement.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
        const y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
        const mouse = new THREE.Vector2(x, y);
        raycaster.setFromCamera(mouse, camera3D);
        const intersects = raycaster.intersectObject(sphereMesh);
        if (intersects.length > 0) {
            const uv = intersects[0].uv;
            startDrawAt(uv.x * mainCanvas.width, (1 - uv.y) * mainCanvas.height);
        }
        return;
    }
    if (is3D) return;
    const pos = getPos(e);
    startDrawAt(pos.x, pos.y);
}

function draw(e) {
    if (!isDrawing) return;
    e.preventDefault();
    if (is3D) {
        const rect = renderer3D.domElement.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
        const y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
        const mouse = new THREE.Vector2(x, y);
        raycaster.setFromCamera(mouse, camera3D);
        const intersects = raycaster.intersectObject(sphereMesh);
        if (intersects.length > 0) {
            const uv = intersects[0].uv;
            drawAt(uv.x * mainCanvas.width, (1 - uv.y) * mainCanvas.height);
        }
        return;
    }
    const pos = getPos(e);
    drawAt(pos.x, pos.y);
}

function endDraw(e) {
    if (!isDrawing) return;
    isDrawing = false;
    if (is3D) { compositeLayers(); return; }
    endDrawAt();
}

// Fullscreen drawing mapping
function mapFullscreenCoords(clientX, clientY) {
    const rect = fullscreenCanvas.getBoundingClientRect();
    const fx = (clientX - rect.left) / rect.width * fullscreenCanvas.width;
    const fy = (clientY - rect.top) / rect.height * fullscreenCanvas.height;
    const scale = Math.min(fullscreenCanvas.width / mainCanvas.width, fullscreenCanvas.height / mainCanvas.height);
    const dx = (fullscreenCanvas.width - mainCanvas.width * scale) / 2;
    const dy = (fullscreenCanvas.height - mainCanvas.height * scale) / 2;
    return { x: (fx - dx) / scale, y: (fy - dy) / scale };
}

function handleFullscreenStart(e) {
    e.preventDefault();
    const { x, y } = mapFullscreenCoords(e.clientX, e.clientY);
    startDrawAt(x, y);
}
function handleFullscreenMove(e) {
    if (!isDrawing) return;
    e.preventDefault();
    const { x, y } = mapFullscreenCoords(e.clientX, e.clientY);
    drawAt(x, y);
}
function handleFullscreenEnd(e) {
    endDrawAt();
}

// Fullscreen management
function compositeLayersToFullscreen() {
    fullscreenCtx.clearRect(0, 0, fullscreenCanvas.width, fullscreenCanvas.height);
    const scale = Math.min(fullscreenCanvas.width / mainCanvas.width, fullscreenCanvas.height / mainCanvas.height);
    const dx = (fullscreenCanvas.width - mainCanvas.width * scale) / 2;
    const dy = (fullscreenCanvas.height - mainCanvas.height * scale) / 2;
    layers.forEach(layer => {
        fullscreenCtx.drawImage(layer.canvas, dx, dy, mainCanvas.width * scale, mainCanvas.height * scale);
    });
}

function enterFullscreen() {
    isFullscreen = true;
    fullscreenOverlay.classList.add('active');
    fullscreenCanvas.width = window.innerWidth;
    fullscreenCanvas.height = window.innerHeight;
    compositeLayersToFullscreen();
    // Attach fullscreen drawing events
    fullscreenCanvas.addEventListener('mousedown', handleFullscreenStart);
    fullscreenCanvas.addEventListener('mousemove', handleFullscreenMove);
    fullscreenCanvas.addEventListener('mouseup', handleFullscreenEnd);
    fullscreenCanvas.addEventListener('mouseleave', handleFullscreenEnd);
    fullscreenCanvas.addEventListener('touchstart', handleFullscreenStart, { passive: false });
    fullscreenCanvas.addEventListener('touchmove', handleFullscreenMove, { passive: false });
    fullscreenCanvas.addEventListener('touchend', handleFullscreenEnd);
    fullscreenCanvas.addEventListener('touchcancel', handleFullscreenEnd);
}

function exitFullscreen() {
    isFullscreen = false;
    fullscreenOverlay.classList.remove('active');
    // Remove event listeners
    fullscreenCanvas.removeEventListener('mousedown', handleFullscreenStart);
    fullscreenCanvas.removeEventListener('mousemove', handleFullscreenMove);
    fullscreenCanvas.removeEventListener('mouseup', handleFullscreenEnd);
    fullscreenCanvas.removeEventListener('mouseleave', handleFullscreenEnd);
    fullscreenCanvas.removeEventListener('touchstart', handleFullscreenStart);
    fullscreenCanvas.removeEventListener('touchmove', handleFullscreenMove);
    fullscreenCanvas.removeEventListener('touchend', handleFullscreenEnd);
    fullscreenCanvas.removeEventListener('touchcancel', handleFullscreenEnd);
}

document.getElementById('fullscreenBtn').addEventListener('click', enterFullscreen);
document.getElementById('exitFullscreenBtn').addEventListener('click', exitFullscreen);

// Override compositeLayers to also update fullscreen if active
const _compositeLayers = compositeLayers;
compositeLayers = function() {
    _compositeLayers();
    if (isFullscreen) compositeLayersToFullscreen();
};

// ---------- Other drawing helpers ----------
function floodFill(startX, startY) {
    const layerCanvas = getActiveLayerCanvas();
    const lctx = layerCanvas.getContext('2d');
    const imageData = lctx.getImageData(0, 0, layerCanvas.width, layerCanvas.height);
    const data = imageData.data;
    const w = layerCanvas.width, h = layerCanvas.height;
    const targetIdx = (startY * w + startX) * 4;
    const targetR = data[targetIdx], targetG = data[targetIdx+1], targetB = data[targetIdx+2], targetA = data[targetIdx+3];
    const fillR = parseInt(currentColor.slice(1,3), 16);
    const fillG = parseInt(currentColor.slice(3,5), 16);
    const fillB = parseInt(currentColor.slice(5,7), 16);
    const fillA = Math.round(brushOpacity * 255);
    if (targetR === fillR && targetG === fillG && targetB === fillB && targetA === fillA) return;
    const stack = [[startX, startY]];
    const visited = new Uint8Array(w * h);
    const idx = (y, x) => (y * w + x) * 4;
    while (stack.length) {
        const [x, y] = stack.pop();
        if (x < 0 || x >= w || y < 0 || y >= h) continue;
        const pixelIdx = y * w + x;
        if (visited[pixelIdx]) continue;
        const p = idx(y, x);
        if (data[p] !== targetR || data[p+1] !== targetG || data[p+2] !== targetB || data[p+3] !== targetA) continue;
        visited[pixelIdx] = 1;
        data[p] = fillR; data[p+1] = fillG; data[p+2] = fillB; data[p+3] = fillA;
        stack.push([x+1, y], [x-1, y], [x, y+1], [x, y-1]);
    }
    lctx.putImageData(imageData, 0, 0);
}

function pickColor(x, y) {
    const compositeData = ctx.getImageData(x, y, 1, 1).data;
    const hex = '#' + ((1 << 24) + (compositeData[0] << 16) + (compositeData[1] << 8) + compositeData[2]).toString(16).slice(1);
    colorPicker.value = hex; currentColor = hex;
}

const textModal = document.getElementById('textModal');
const textInput = document.getElementById('textInput');
let textPlaceX = 0, textPlaceY = 0;
function openTextModal(x, y) {
    textPlaceX = x; textPlaceY = y;
    textModal.style.display = 'flex';
    textInput.value = ''; textInput.focus();
}
document.getElementById('textConfirm').addEventListener('click', () => {
    const text = textInput.value.trim();
    if (text) {
        const lctx = getActiveLayerCanvas().getContext('2d');
        lctx.font = `${brushSize*2}px "Segoe UI", Roboto, sans-serif`;
        lctx.fillStyle = currentColor; lctx.globalAlpha = brushOpacity;
        lctx.fillText(text, textPlaceX, textPlaceY);
        lctx.globalAlpha = 1;
        saveSnapshot(); compositeLayers();
    }
    textModal.style.display = 'none';
});
document.getElementById('textCancel').addEventListener('click', () => textModal.style.display = 'none');

// ---------- 3D Mode ----------
function init3D() {
    renderer3D = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer3D.setPixelRatio(window.devicePixelRatio);
    renderer3D.setSize(container.clientWidth, container.clientHeight);
    threeContainer.appendChild(renderer3D.domElement);
    scene3D = new THREE.Scene();
    camera3D = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
    camera3D.position.set(0, 0, 5);
    controls3D = new OrbitControls(camera3D, renderer3D.domElement);
    controls3D.enableDamping = true; controls3D.dampingFactor = 0.05;
    controls3D.rotateSpeed = 0.8;

    const geometry = new THREE.SphereGeometry(2, 64, 64);
    texture3D = new THREE.CanvasTexture(mainCanvas);
    const material = new THREE.MeshStandardMaterial({ map: texture3D });
    sphereMesh = new THREE.Mesh(geometry, material);
    scene3D.add(sphereMesh);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene3D.add(ambientLight);
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
    dirLight.position.set(1, 1, 1);
    scene3D.add(dirLight);

    animate3D();
}

function animate3D() {
    if (!is3D) return;
    requestAnimationFrame(animate3D);
    controls3D.update();
    renderer3D.render(scene3D, camera3D);
}

function update3DTexture() {
    if (texture3D) texture3D.needsUpdate = true;
}

function enable3D() {
    is3D = true;
    mainCanvas.style.display = 'none';
    previewCanvas.style.display = 'none';
    threeContainer.style.display = 'block';
    if (!renderer3D) {
        init3D();
    } else {
        renderer3D.setSize(container.clientWidth, container.clientHeight);
        camera3D.aspect = container.clientWidth / container.clientHeight;
        camera3D.updateProjectionMatrix();
    }
    toggle3DBtn.classList.add('active');
    toggle3DBtn.innerHTML = '<span>🌐</span> 2D Mode';
    compositeLayers();
}

function disable3D() {
    is3D = false;
    mainCanvas.style.display = 'block';
    previewCanvas.style.display = 'block';
    threeContainer.style.display = 'none';
    toggle3DBtn.classList.remove('active');
    toggle3DBtn.innerHTML = '<span>🌐</span> 360° / 3D';
}

toggle3DBtn.addEventListener('click', () => {
    if (is3D) disable3D();
    else enable3D();
});

// ---------- Upload ----------
const uploadBtn = document.getElementById('uploadBtn');
const uploadInput = document.getElementById('uploadInput');
uploadBtn.addEventListener('click', () => uploadInput.click());
uploadInput.addEventListener('change', handleFileUpload);

function handleFileUpload(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    const isPDF = file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf');
    const isSVG = file.type === 'image/svg+xml' || file.name.toLowerCase().endsWith('.svg');
    if (isPDF) {
        if (typeof pdfjsLib === 'undefined') {
            const script = document.createElement('script');
            script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js';
            script.onload = () => {
                pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
                loadPDF(file);
            };
            document.head.appendChild(script);
        } else loadPDF(file);
    } else if (isSVG || file.type.startsWith('image/')) {
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => { addImageToNewLayer(img); uploadInput.value = ''; };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    } else {
        alert(t('upload_error') + ' Unsupported file type.');
    }
}

function loadPDF(file) {
    const fileReader = new FileReader();
    fileReader.onload = function() {
        const typedarray = new Uint8Array(this.result);
        pdfjsLib.getDocument(typedarray).promise.then(pdf => {
            pdf.getPage(1).then(page => {
                const viewport = page.getViewport({ scale: 1 });
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.width = viewport.width; canvas.height = viewport.height;
                page.render({ canvasContext: context, viewport: viewport }).promise.then(() => {
                    const img = new Image();
                    img.onload = () => addImageToNewLayer(img);
                    img.src = canvas.toDataURL();
                });
            });
        }).catch(err => alert(t('upload_error')));
    };
    fileReader.readAsArrayBuffer(file);
}

function addImageToNewLayer(img) {
    const w = mainCanvas.width, h = mainCanvas.height;
    const layerCanvas = createLayerCanvas(w, h, false);
    const lctx = layerCanvas.getContext('2d');
    const scale = Math.min(w / img.width, h / img.height, 1);
    const dx = (w - img.width * scale) / 2;
    const dy = (h - img.height * scale) / 2;
    lctx.drawImage(img, dx, dy, img.width * scale, img.height * scale);
    saveSnapshot();
    layers.push({ canvas: layerCanvas, name: 'Imported', visible: true });
    activeLayerIndex = layers.length - 1;
    renderLayerList(); compositeLayers();
}

// ---------- Download ----------
const downloadMenu = document.getElementById('downloadMenu');
document.getElementById('downloadBtn').addEventListener('click', (e) => {
    e.stopPropagation();
    downloadMenu.style.display = downloadMenu.style.display === 'flex' ? 'none' : 'flex';
});
document.addEventListener('click', () => { downloadMenu.style.display = 'none'; });
downloadMenu.addEventListener('click', (e) => e.stopPropagation());

document.querySelectorAll('.download-option').forEach(btn => {
    btn.addEventListener('click', () => {
        const type = btn.dataset.type;
        if (type === 'png') downloadCanvas('image/png', 'drawing.png');
        else if (type === 'jpeg') downloadCanvas('image/jpeg', 'drawing.jpg', 0.9);
        else if (type === 'webp') downloadCanvas('image/webp', 'drawing.webp');
        else if (type === 'avif') downloadCanvas('image/avif', 'drawing.avif');
        else if (type === 'svg') downloadSVG();
        else if (type === 'pdf') generatePDF();
        downloadMenu.style.display = 'none';
    });
});

function downloadCanvas(mimeType, filename, quality) {
    if (mimeType === 'image/avif' || mimeType === 'image/webp') {
        mainCanvas.toBlob(blob => {
            if (blob) {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = filename; a.click();
                URL.revokeObjectURL(url);
            }
        }, mimeType, quality);
    } else {
        const dataUrl = mainCanvas.toDataURL(mimeType, quality);
        const a = document.createElement('a'); a.href = dataUrl; a.download = filename; a.click();
    }
}

function downloadSVG() {
    const dataUrl = mainCanvas.toDataURL('image/png');
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${mainCanvas.width}" height="${mainCanvas.height}"><image href="${dataUrl}" width="${mainCanvas.width}" height="${mainCanvas.height}"/></svg>`;
    const blob = new Blob([svg], {type: 'image/svg+xml'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = 'drawing.svg'; a.click();
    URL.revokeObjectURL(url);
}

function generatePDF() {
    if (typeof window.jspdf === 'undefined') {
        const script = document.createElement('script');
        script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
        script.onload = () => exportPDF();
        document.head.appendChild(script);
    } else exportPDF();
}
function exportPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('landscape', 'px', [mainCanvas.width, mainCanvas.height]);
    doc.addImage(mainCanvas.toDataURL('image/png'), 'PNG', 0, 0, mainCanvas.width, mainCanvas.height);
    doc.save('drawing.pdf');
}

// Recording
document.getElementById('recordBtn').addEventListener('click', () => {
    if (isRecording) {
        mediaRecorder.stop();
        isRecording = false;
        document.getElementById('recordBtn').innerHTML = '🎥 Record MP4';
    } else {
        const stream = mainCanvas.captureStream(30);
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
        recordedChunks = [];
        mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
        mediaRecorder.onstop = () => {
            const blob = new Blob(recordedChunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = 'drawing.webm'; a.click();
            URL.revokeObjectURL(url);
        };
        mediaRecorder.start();
        isRecording = true;
        document.getElementById('recordBtn').innerHTML = '⏹️ Stop Recording';
    }
    downloadMenu.style.display = 'none';
});

// Event listeners (normal mode)
mainCanvas.addEventListener('mousedown', startDraw);
mainCanvas.addEventListener('mousemove', draw);
mainCanvas.addEventListener('mouseup', endDraw);
mainCanvas.addEventListener('mouseleave', endDraw);
mainCanvas.addEventListener('touchstart', startDraw, { passive: false });
mainCanvas.addEventListener('touchmove', draw, { passive: false });
mainCanvas.addEventListener('touchend', endDraw);
mainCanvas.addEventListener('touchcancel', endDraw);

// Settings
brushSizeInput.addEventListener('input', () => { brushSize = parseInt(brushSizeInput.value); sizeValue.textContent = brushSize; });
brushOpacityInput.addEventListener('input', () => { brushOpacity = parseFloat(brushOpacityInput.value); opacityValue.textContent = Math.round(brushOpacity * 100) + '%'; });
colorPicker.addEventListener('input', () => { currentColor = colorPicker.value; });

// Layer buttons
document.getElementById('addLayerBtn').addEventListener('click', () => {
    saveSnapshot();
    const newCanvas = createLayerCanvas(mainCanvas.width, mainCanvas.height, false);
    layers.push({ canvas: newCanvas, name: `Layer ${layers.length+1}`, visible: true });
    activeLayerIndex = layers.length - 1;
    renderLayerList(); compositeLayers();
});
document.getElementById('deleteLayerBtn').addEventListener('click', () => {
    if (layers.length <= 1) return;
    saveSnapshot();
    layers.splice(activeLayerIndex, 1);
    if (activeLayerIndex >= layers.length) activeLayerIndex = layers.length - 1;
    renderLayerList(); compositeLayers();
});
document.getElementById('mergeDownBtn').addEventListener('click', () => {
    if (activeLayerIndex === 0 || layers.length < 2) return;
    saveSnapshot();
    const upper = layers[activeLayerIndex].canvas;
    const lower = layers[activeLayerIndex - 1].canvas;
    lower.getContext('2d').drawImage(upper, 0, 0);
    layers.splice(activeLayerIndex, 1);
    activeLayerIndex--;
    renderLayerList(); compositeLayers();
});
document.getElementById('duplicateLayerBtn').addEventListener('click', () => {
    saveSnapshot();
    const dupCanvas = createLayerCanvas(mainCanvas.width, mainCanvas.height, false);
    dupCanvas.getContext('2d').drawImage(layers[activeLayerIndex].canvas, 0, 0);
    layers.splice(activeLayerIndex+1, 0, { canvas: dupCanvas, name: `${layers[activeLayerIndex].name} copy`, visible: true });
    activeLayerIndex++;
    renderLayerList(); compositeLayers();
});

// Undo/Redo
document.addEventListener('keydown', (e) => {
    if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undo(); }
    else if (e.ctrlKey && e.key === 'y') { e.preventDefault(); redo(); }
});

// New, Save/Load Draft
document.getElementById('newBtn').addEventListener('click', () => { if (confirm(t('new')+'?')) newCanvas(); });
document.getElementById('saveDraftBtn').addEventListener('click', () => {
    localStorage.setItem('procreate_draft', JSON.stringify(layers.map(l => l.canvas.toDataURL())));
    alert(t('draft_saved'));
});
document.getElementById('loadDraftBtn').addEventListener('click', () => {
    const draft = localStorage.getItem('procreate_draft');
    if (!draft) { alert(t('no_draft')); return; }
    const dataURLs = JSON.parse(draft);
    layers = [];
    dataURLs.forEach((dataURL, i) => {
        const c = createLayerCanvas(mainCanvas.width, mainCanvas.height, false);
        const img = new Image();
        img.onload = () => {
            c.getContext('2d').drawImage(img, 0, 0);
            if (i === dataURLs.length - 1) { compositeLayers(); renderLayerList(); }
        };
        img.src = dataURL;
        layers.push({ canvas: c, name: `Layer ${i+1}`, visible: true });
    });
    activeLayerIndex = 0;
    saveSnapshot(); renderLayerList();
    alert(t('draft_loaded'));
});

// Responsive panels
function toggleLeftPanel() { leftPanel.classList.toggle('open'); }
function toggleRightPanel() { rightPanel.classList.toggle('open'); }
leftToggle.addEventListener('click', toggleLeftPanel);
rightToggle.addEventListener('click', toggleRightPanel);
function checkMobile() {
    const mobile = window.innerWidth <= 900;
    leftToggle.style.display = mobile ? 'block' : 'none';
    rightToggle.style.display = mobile ? 'block' : 'none';
    if (!mobile) { leftPanel.classList.remove('open'); rightPanel.classList.remove('open'); }
}
window.addEventListener('resize', checkMobile);
checkMobile();

// Initialize
resizeCanvas();
newCanvas();
</script>
